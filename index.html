// Offscreen background cache
let bgCache = null;
let bgCacheW = 0, bgCacheH = 0;
let bgStarCanvas = null;
let bgStarLastFrame = -999;

function rebuildBgCache() {
  bgCacheW = W;
  bgCacheH = H;
  
  bgCache = document.createElement('canvas');
  bgCache.width = W;
  bgCache.height = H;
  let b = bgCache.getContext('2d');
  
  let T = THEMES[settings.theme] || THEMES[0];
  let acc = (a) => `rgba(${T.pri[0]},${T.pri[1]},${T.pri[2]},${a})`;
  
  // === Base gradient ===
  let bgGrad = b.createRadialGradient(W / 2, H * 0.25, 0, W / 2, H * 0.3, H * 0.9);
  bgGrad.addColorStop(0, T.bg[0]);
  bgGrad.addColorStop(0.35, T.bg[1]);
  bgGrad.addColorStop(0.7, T.bg[2]);
  bgGrad.addColorStop(1, T.bg[3]);
  b.fillStyle = bgGrad;
  b.fillRect(0, 0, W, H);
  
  // === Nebula color blobs ===
  let nebPositions = [
    { x: 0.15, y: 0.12, r: 0.35 },
    { x: 0.85, y: 0.25, r: 0.3 },
    { x: 0.5, y: 0.55, r: 0.25 },
    { x: 0.2, y: 0.8, r: 0.3 },
    { x: 0.8, y: 0.75, r: 0.28 },
    { x: 0.5, y: 0.1, r: 0.2 }
  ];
  let nebulae = nebPositions.map((p, i) => ({ ...p, color: T.neb[i] || T.neb[0] }));
  for (let n of nebulae) {
    let nx = n.x * W, ny = n.y * H, nr = n.r * Math.max(W, H);
    let ng = b.createRadialGradient(nx, ny, 0, nx, ny, nr);
    ng.addColorStop(0, `rgba(${n.color[0]},${n.color[1]},${n.color[2]},0.12)`);
    ng.addColorStop(0.5, `rgba(${n.color[0]},${n.color[1]},${n.color[2]},0.04)`);
    ng.addColorStop(1, 'rgba(0,0,0,0)');
    b.fillStyle = ng;
    b.fillRect(0, 0, W, H);
  }
  
  // === Diamond grid pattern ===
  b.save();
  b.globalAlpha = 0.025;
  b.strokeStyle = acc(1);
  b.lineWidth = 0.5;
  let gridSpacing = Math.max(30, Math.min(50, W / 10));
  for (let gy = -gridSpacing; gy < H + gridSpacing; gy += gridSpacing) {
    for (let gx = -gridSpacing; gx < W + gridSpacing; gx += gridSpacing) {
      let ox = (Math.floor(gy / gridSpacing) % 2) * gridSpacing * 0.5;
      let dx = gx + ox;
      b.beginPath();
      b.moveTo(dx, gy - gridSpacing * 0.4);
      b.lineTo(dx + gridSpacing * 0.4, gy);
      b.lineTo(dx, gy + gridSpacing * 0.4);
      b.lineTo(dx - gridSpacing * 0.4, gy);
      b.closePath();
      b.stroke();
    }
  }
  b.restore();
  
  // === Scattered geometric shapes (static decoration) ===
  b.save();
  let shapes = [];
  let rng = function(seed) {
    let x = Math.sin(seed * 127.1 + 311.7) * 43758.5453;
    return x - Math.floor(x);
  };
  for (let i = 0; i < 18; i++) {
    shapes.push({
      x: rng(i * 3.1) * W,
      y: rng(i * 7.3 + 1) * H,
      size: 8 + rng(i * 5.7 + 2) * 25,
      rot: rng(i * 2.3 + 3) * Math.PI * 2,
      type: Math.floor(rng(i * 9.1 + 4) * 4),
      alpha: 0.015 + rng(i * 4.4 + 5) * 0.025
    });
  }
  for (let s of shapes) {
    b.save();
    b.globalAlpha = s.alpha;
    b.translate(s.x, s.y);
    b.rotate(s.rot);
    b.strokeStyle = acc(0.8);
    b.lineWidth = 1;
    
    if (s.type === 0) {
      // Square
      b.strokeRect(-s.size / 2, -s.size / 2, s.size, s.size);
    } else if (s.type === 1) {
      // Circle
      b.beginPath();
      b.arc(0, 0, s.size / 2, 0, Math.PI * 2);
      b.stroke();
    } else if (s.type === 2) {
      // Triangle
      b.beginPath();
      for (let j = 0; j < 3; j++) {
        let a = (j / 3) * Math.PI * 2 - Math.PI / 2;
        let px = Math.cos(a) * s.size / 2;
        let py = Math.sin(a) * s.size / 2;
        j === 0 ? b.moveTo(px, py) : b.lineTo(px, py);
      }
      b.closePath();
      b.stroke();
    } else {
      // Hexagon
      b.beginPath();
      for (let j = 0; j < 6; j++) {
        let a = (j / 6) * Math.PI * 2;
        let px = Math.cos(a) * s.size / 2;
        let py = Math.sin(a) * s.size / 2;
        j === 0 ? b.moveTo(px, py) : b.lineTo(px, py);
      }
      b.closePath();
      b.stroke();
    }
    b.restore();
  }
  b.restore();
  
  // === Light rays from top ===
  b.save();
  b.globalAlpha = 0.025;
  for (let i = 0; i < 5; i++) {
    let rx = W * (0.15 + i * 0.175);
    let rw = W * 0.04 + i * 3;
    let rayGrad = b.createLinearGradient(rx, 0, rx, H * 0.7);
    rayGrad.addColorStop(0, acc(0.5));
    rayGrad.addColorStop(0.3, acc(0.15));
    rayGrad.addColorStop(1, acc(0));
    b.fillStyle = rayGrad;
    b.beginPath();
    b.moveTo(rx - rw, 0);
    b.lineTo(rx + rw, 0);
    b.lineTo(rx + rw * 3, H * 0.7);
    b.lineTo(rx - rw * 3, H * 0.7);
    b.closePath();
    b.fill();
  }
  b.restore();
  
  // === Vignette ===
  let vig = b.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, Math.max(W, H) * 0.75);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(0.7, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.4)');
  b.fillStyle = vig;
  b.fillRect(0, 0, W, H);
  
  // === Subtle horizontal scan lines ===
  b.save();
  b.globalAlpha = 0.02;
  for (let sy = 0; sy < H; sy += 3) {
    b.fillStyle = '#000';
    b.fillRect(0, sy, W, 1);
  }
  b.restore();
}

// Floating background shapes (animated)
let bgFloaters = [];
for (let i = 0; i < 12; i++) {
  bgFloaters.push({
    x: Math.random(),
    y: Math.random(),
    size: 12 + Math.random() * 30,
    speedX: (Math.random() - 0.5) * 0.0003,
    speedY: -0.0001 - Math.random() * 0.0003,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.003,
    type: Math.floor(Math.random() * 4), // 0=block, 1=L, 2=T, 3=line
    color: Math.floor(Math.random() * BLOCK_COLORS.length),
    alpha: 0.03 + Math.random() * 0.04
  });
}

function drawBackground() {
  if (!bgCache || bgCacheW !== W || bgCacheH !== H) {
    rebuildBgCache();
    bgStarCanvas = null;
  }
  
  ctx.drawImage(bgCache, 0, 0);
  
  // Animated layer
  let starInterval = getStarUpdateInterval();
  let starFrame = (globalTime / starInterval) | 0;
  if (!bgStarCanvas || starFrame !== bgStarLastFrame) {
    bgStarLastFrame = starFrame;
    
    if (!bgStarCanvas) {
      bgStarCanvas = document.createElement('canvas');
      bgStarCanvas.width = W;
      bgStarCanvas.height = H;
    }
    let s = bgStarCanvas.getContext('2d');
    s.clearRect(0, 0, W, H);
    
    // === Floating block shapes ===
    for (let f of bgFloaters) {
      f.x += f.speedX;
      f.y += f.speedY;
      f.rot += f.rotSpeed;
      // Wrap
      if (f.y < -0.1) { f.y = 1.1; f.x = Math.random(); }
      if (f.x < -0.1) f.x = 1.1;
      if (f.x > 1.1) f.x = -0.1;
      
      let fx = f.x * W, fy = f.y * H;
      let c = BLOCK_COLORS[f.color];
      let bs = f.size;
      
      s.save();
      s.globalAlpha = f.alpha;
      s.translate(fx, fy);
      s.rotate(f.rot);
      s.strokeStyle = c.main;
      s.lineWidth = 1.5;
      let r2 = parseInt(c.main.slice(1, 3), 16) || 128;
      let g2 = parseInt(c.main.slice(3, 5), 16) || 128;
      let b2 = parseInt(c.main.slice(5, 7), 16) || 128;
      s.fillStyle = `rgba(${r2},${g2},${b2},0.15)`;
      
      // Draw tetromino-like shapes
      let cells = [];
      if (f.type === 0) { // 2x2 block
        cells = [[0,0],[1,0],[0,1],[1,1]];
      } else if (f.type === 1) { // L shape
        cells = [[0,0],[0,1],[0,2],[1,2]];
      } else if (f.type === 2) { // T shape
        cells = [[0,0],[1,0],[2,0],[1,1]];
      } else { // line
        cells = [[0,0],[1,0],[2,0],[3,0]];
      }
      
      let half = bs * 0.4;
      for (let cl of cells) {
        let cx = cl[0] * half - half * 0.8;
        let cy = cl[1] * half - half * 0.8;
        s.beginPath();
        rrPath(s, cx, cy, half * 0.9, half * 0.9, half * 0.15);
        s.closePath();
        s.fill();
        s.stroke();
      }
      s.restore();
    }
    
    // === Stars ===
    for (let star of bgStars) {
      let twinkle = 0.3 + Math.sin(globalTime * 0.03 * star.speed + star.phase) * 0.4;
      let sx = star.x * W;
      let sy = star.y * H;
      
      s.globalAlpha = twinkle;
      s.beginPath();
      s.arc(sx, sy, star.size, 0, Math.PI * 2);
      s.fillStyle = '#fff';
      s.fill();
      
      if (star.size > 1.5) {
        s.globalAlpha = twinkle * 0.3;
        let gs = s.createRadialGradient(sx, sy, 0, sx, sy, star.size * 3);
        gs.addColorStop(0, 'rgba(180,160,255,0.4)');
        gs.addColorStop(1, 'rgba(180,160,255,0)');
        s.beginPath();
        s.arc(sx, sy, star.size * 3, 0, Math.PI * 2);
        s.fillStyle = gs;
        s.fill();
      }
    }
    s.globalAlpha = 1;
    
    // === Pulsing orbs ===
    for (let i = 0; i < 6; i++) {
      let ox = (Math.sin(globalTime * 0.006 + i * 2.1) * 0.35 + 0.5) * W;
      let oy = (Math.cos(globalTime * 0.005 + i * 1.7) * 0.35 + 0.5) * H;
      let orbPulse = 0.7 + Math.sin(globalTime * 0.02 + i * 1.3) * 0.3;
      let orbR = (60 + i * 15) * orbPulse;
      let colors = [
        [100, 60, 200], [60, 100, 200], [140, 50, 180],
        [80, 40, 160], [50, 80, 180], [120, 40, 200]
      ];
      let oc = colors[i];
      let og = s.createRadialGradient(ox, oy, 0, ox, oy, orbR);
      og.addColorStop(0, `rgba(${oc[0]},${oc[1]},${oc[2]},0.07)`);
      og.addColorStop(0.6, `rgba(${oc[0]},${oc[1]},${oc[2]},0.02)`);
      og.addColorStop(1, 'rgba(0,0,0,0)');
      s.fillStyle = og;
      s.fillRect(ox - orbR, oy - orbR, orbR * 2, orbR * 2);
    }
  }
  
  ctx.drawImage(bgStarCanvas, 0, 0);
}

// Board cell animation state
let boardCellScale = [];
let boardCellBounce = [];
for (let r = 0; r < ROWS; r++) {
  boardCellScale[r] = [];
  boardCellBounce[r] = [];
  for (let c = 0; c < COLS; c++) {
    boardCellScale[r][c] = 1;
    boardCellBounce[r][c] = 0;
  }
}

// Landing animation queue
let landingCells = [];

function triggerLandingAnim(row, col) {
  boardCellScale[row][col] = 1.3;
  boardCellBounce[row][col] = 1;
}

function drawBoard() {
  ctx.save();
  
  if (shakeAmount > 0) {
    let sx = Math.sin(globalTime * 1.5) * shakeAmount;
    let sy = Math.cos(globalTime * 1.8) * shakeAmount;
    ctx.translate(sx, sy);
  }
  
  let boardW = CELL * COLS;
  let boardH = CELL * ROWS;
  
  // Board frame from cache (theme-aware)
  let T = THEMES[settings.theme] || THEMES[0];
  let acc = (a) => `rgba(${T.pri[0]},${T.pri[1]},${T.pri[2]},${a})`;
  
  let bfKey = `${boardW}_${boardH}_${settings.theme}_${cacheGeneration}`;
  if (!boardFrameCache || boardFrameKey !== bfKey) {
    let margin = 20;
    let fw = boardW + margin * 2;
    let fh = boardH + margin * 2;
    let fc = document.createElement('canvas');
    fc.width = Math.ceil(fw);
    fc.height = Math.ceil(fh);
    let ft = fc.getContext('2d');
    let ox = margin, oy = margin;
    
    for (let i = 4; i >= 0; i--) {
      let ex = i * 5;
      ft.beginPath();
      rrPath(ft, ox - 6 - ex, oy - 6 - ex, boardW + 12 + ex * 2, boardH + 12 + ex * 2, 16 + ex);
      ft.closePath();
      ft.fillStyle = `rgba(${T.pri[0]},${T.pri[1]},${T.pri[2]},${0.03 * (5 - i)})`;
      ft.fill();
    }
    
    ft.beginPath();
    rrPath(ft, ox - 6, oy - 6, boardW + 12, boardH + 12, 16);
    ft.closePath();
    ft.fillStyle = 'rgba(0,0,0,0.4)';
    ft.fill();
    
    ft.beginPath();
    rrPath(ft, ox - 3, oy - 3, boardW + 6, boardH + 6, 14);
    ft.closePath();
    let bg2 = ft.createLinearGradient(ox, oy, ox + boardW, oy + boardH);
    bg2.addColorStop(0, T.board[0]);
    bg2.addColorStop(0.5, T.board[1]);
    bg2.addColorStop(1, T.board[2]);
    ft.fillStyle = bg2;
    ft.fill();
    ft.strokeStyle = acc(0.12);
    ft.lineWidth = 2;
    ft.stroke();
    
    ft.beginPath();
    rrPath(ft, ox, oy, boardW, boardH, 12);
    ft.closePath();
    ft.strokeStyle = acc(0.06);
    ft.lineWidth = 1;
    ft.stroke();
    
    boardFrameCache = { canvas: fc, margin: margin };
    boardFrameKey = bfKey;
  }
  ctx.drawImage(boardFrameCache.canvas, BOARD_X - boardFrameCache.margin, BOARD_Y - boardFrameCache.margin);
  
  // Draw cells
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let x = BOARD_X + c * CELL;
      let y = BOARD_Y + r * CELL;
      
      // Animate scale - skip math if at rest
      let cellSc = boardCellScale[r][c];
      if (cellSc !== 1) {
        cellSc += (1 - cellSc) * 0.15;
        boardCellScale[r][c] = Math.abs(cellSc - 1) < 0.001 ? 1 : cellSc;
      }
      let cellBnc = boardCellBounce[r][c];
      if (cellBnc > 0.01) {
        boardCellBounce[r][c] = cellBnc * 0.9;
      }
      
      let flashing = false;
      if (flashTimer > 0) {
        if (flashRows.includes(r) || flashCols.includes(c)) {
          flashing = true;
        }
      }
      
      if (board[r][c] > 0) {
        ctx.save();
        
        let sc = boardCellScale[r][c];
        if (sc !== 1) {
          let cx2 = x + CELL / 2;
          let cy2 = y + CELL / 2;
          ctx.translate(cx2, cy2);
          ctx.scale(sc, sc);
          ctx.translate(-cx2, -cy2);
        }
        
        if (flashing) {
          let flashPhase = (flashTimer / 20);
          let flashScale = 1 + Math.sin(flashTimer * 0.8) * 0.08;
          let cx2 = x + CELL / 2;
          let cy2 = y + CELL / 2;
          ctx.translate(cx2, cy2);
          ctx.scale(flashScale, flashScale);
          ctx.translate(-cx2, -cy2);
          
          drawBlock(x, y, CELL, board[r][c] - 1, 1, true);
          
          // White flash overlay
          ctx.globalAlpha = 0.3 + Math.sin(flashTimer * 0.6) * 0.3;
          drawRoundRect(x + CELL * 0.06, y + CELL * 0.06, CELL * 0.88, CELL * 0.88, CELL * 0.18);
          ctx.fillStyle = '#fff';
          ctx.fill();
          
          // Glow ring
          ctx.globalAlpha = 0.15 * flashPhase;
          ctx.beginPath();
          ctx.arc(x + CELL / 2, y + CELL / 2, CELL * 0.6, 0, Math.PI * 2);
          ctx.strokeStyle = '#fff';
          ctx.lineWidth = 2;
          ctx.stroke();
        } else {
          drawBlock(x, y, CELL, board[r][c] - 1);
        }
        
        ctx.restore();
      } else {
        if (flashing) {
          ctx.save();
          let flashAlpha = 0.2 + Math.sin(flashTimer * 0.6) * 0.15;
          ctx.globalAlpha = flashAlpha;
          drawRoundRect(x + CELL * 0.06, y + CELL * 0.06, CELL * 0.88, CELL * 0.88, CELL * 0.18);
          let fGrad = ctx.createRadialGradient(x + CELL / 2, y + CELL / 2, 0, x + CELL / 2, y + CELL / 2, CELL * 0.5);
          fGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
          fGrad.addColorStop(1, 'rgba(255,255,255,0.1)');
          ctx.fillStyle = fGrad;
          ctx.fill();
          ctx.restore();
        }
        drawEmptyCell(x, y, CELL, r, c);
      }
    }
  }
  
  // Ghost preview with pulsing
  if (settings.ghost && dragging && hoverCell && canPlace) {
    let piece = panelPieces[dragging.pieceIndex];
    if (piece) {
      // Highlight valid rows/cols that would complete
      let previewRows = [];
      let previewCols = [];
      
      // Simulate placement
      let tempBoard = board.map(r => [...r]);
      for (let r = 0; r < piece.rows; r++) {
        for (let c = 0; c < piece.cols; c++) {
          if (piece.shape[r][c]) {
            tempBoard[hoverCell.row + r][hoverCell.col + c] = piece.color + 1;
          }
        }
      }
      for (let r = 0; r < ROWS; r++) {
        if (tempBoard[r].every(v => v > 0)) previewRows.push(r);
      }
      for (let c = 0; c < COLS; c++) {
        let full = true;
        for (let r = 0; r < ROWS; r++) { if (tempBoard[r][c] === 0) { full = false; break; } }
        if (full) previewCols.push(c);
      }
      
      // Draw line completion preview
      if (previewRows.length > 0 || previewCols.length > 0) {
        ctx.save();
        ctx.globalAlpha = 0.08 + Math.sin(globalTime * 0.15) * 0.04;
        for (let r of previewRows) {
          drawRoundRect(BOARD_X, BOARD_Y + r * CELL, boardW, CELL, 4);
          ctx.fillStyle = '#FFD700';
          ctx.fill();
        }
        for (let c of previewCols) {
          drawRoundRect(BOARD_X + c * CELL, BOARD_Y, CELL, boardH, 4);
          ctx.fillStyle = '#FFD700';
          ctx.fill();
        }
        ctx.restore();
      }
      
      // Ghost blocks
      let ghostPulse = 0.35 + Math.sin(globalTime * 0.12) * 0.1;
      for (let r = 0; r < piece.rows; r++) {
        for (let c = 0; c < piece.cols; c++) {
          if (piece.shape[r][c]) {
            let br = hoverCell.row + r;
            let bc = hoverCell.col + c;
            let bx = BOARD_X + bc * CELL;
            let by = BOARD_Y + br * CELL;
            drawBlock(bx, by, CELL, piece.color, ghostPulse, true);
          }
        }
      }
    }
  }
  
  // Invalid placement indicator
  if (settings.ghost && dragging && hoverCell && !canPlace) {
    let piece = panelPieces[dragging.pieceIndex];
    if (piece) {
      ctx.save();
      ctx.globalAlpha = 0.15 + Math.sin(globalTime * 0.2) * 0.05;
      for (let r = 0; r < piece.rows; r++) {
        for (let c = 0; c < piece.cols; c++) {
          if (piece.shape[r][c]) {
            let br = hoverCell.row + r;
            let bc = hoverCell.col + c;
            if (br >= 0 && br < ROWS && bc >= 0 && bc < COLS) {
              let bx = BOARD_X + bc * CELL;
              let by = BOARD_Y + br * CELL;
              drawRoundRect(bx + CELL * 0.1, by + CELL * 0.1, CELL * 0.8, CELL * 0.8, CELL * 0.15);
              ctx.fillStyle = '#FF3333';
              ctx.fill();
            }
          }
        }
      }
      ctx.restore();
    }
  }
  
  ctx.restore();
}

let displayScore = 0;
let scorePopScale = 1;

function drawSettingsButton() {
  let btnR = Math.max(14, Math.min(22, W * 0.04));
  let btnX = W - btnR - Math.max(8, W * 0.025);
  let btnY_pos = Math.round(SCORE_H / 2);

  ctx.save();
  ctx.beginPath();
  ctx.arc(btnX, btnY_pos, btnR, 0, Math.PI * 2);
  ctx.fillStyle = settingsOpen ? 'rgba(140,100,255,0.4)' : 'rgba(140,100,255,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(140,100,255,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();

  let rot = globalTime * 0.01;
  ctx.translate(btnX, btnY_pos);
  ctx.rotate(rot);
  ctx.font = `${Math.round(btnR * 1.05)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('⚙️', 0, 1);
  ctx.restore();

  window._settingsBtn = { x: btnX, y: btnY_pos, r: btnR + 8 };
}

function drawScore() {
  if (displayScore < score) {
    let diff = score - displayScore;
    displayScore += Math.max(1, Math.ceil(diff * 0.12));
    if (displayScore > score) displayScore = score;
  }
  if (scorePopScale > 1.001) {
    scorePopScale += (1 - scorePopScale) * 0.1;
  }
  
  // === Panel geometry ===
  let pad = Math.round(Math.max(8, W * 0.02));
  let panelW = W - pad * 2;
  let panelH = Math.round(Math.min(SCORE_H - 8, 72));
  let panelX = pad;
  let panelY2 = Math.round((SCORE_H - panelH) / 2);
  let spr = Math.min(16, panelH * 0.24);
  let midX = Math.round(panelX + panelW / 2);
  let midY = Math.round(panelY2 + panelH / 2);
  
  // === Font sizes ===
  let labelSize = Math.round(Math.max(9, Math.min(11, W * 0.025)));
  let scoreSize = Math.round(Math.max(20, Math.min(28, W * 0.06)));
  let bestLSize = Math.round(Math.max(8, Math.min(10, W * 0.02)));
  let bestVSize = Math.round(Math.max(11, Math.min(15, W * 0.032)));
  let emojiSize = Math.round(Math.max(14, Math.min(20, panelH * 0.35)));
  
  // === Panel background ===
  ctx.save();
  for (let i = 2; i >= 0; i--) {
    let ex = i * 3;
    drawRoundRect(panelX - ex, panelY2 - ex, panelW + ex * 2, panelH + ex * 2, spr + ex);
    ctx.fillStyle = `rgba(100,50,200,${0.025 * (3 - i)})`;
    ctx.fill();
  }
  drawRoundRect(panelX, panelY2, panelW, panelH, spr);
  let sbg = ctx.createLinearGradient(panelX, panelY2, panelX + panelW, panelY2);
  sbg.addColorStop(0, 'rgba(35,18,70,0.75)');
  sbg.addColorStop(0.5, 'rgba(28,14,60,0.85)');
  sbg.addColorStop(1, 'rgba(35,18,70,0.75)');
  ctx.fillStyle = sbg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(140,100,255,0.12)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
  
  // === Three-column layout ===
  // Left: best score  |  Center: score  |  Right: sound button
  
  let leftEdge = panelX + Math.round(panelW * 0.04);
  let rightEdge = panelX + panelW - Math.round(panelW * 0.04);
  
  ctx.save();
  
  // --- LEFT: Best score ---
  let bestCX = Math.round(panelX + panelW * 0.15);
  
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  ctx.font = `bold ${bestLSize}px Nunito, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillText('BEST', bestCX, midY - bestVSize * 0.5);
  
  ctx.font = `bold ${bestVSize}px Fredoka One, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText(bestScore.toLocaleString(), bestCX, midY + bestLSize * 0.6);
  
  // --- CENTER: Main score ---
  ctx.save();
  ctx.translate(midX, midY);
  ctx.scale(scorePopScale, scorePopScale);
  
  ctx.font = `bold ${labelSize}px Fredoka One, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SCORE', 0, -scoreSize * 0.42);
  
  ctx.font = `bold ${scoreSize}px Fredoka One, sans-serif`;
  // Glow layer
  ctx.save();
  ctx.globalAlpha = 0.3;
  ctx.fillStyle = 'rgba(255,215,0,0.7)';
  ctx.fillText(displayScore.toLocaleString(), 1, scoreSize * 0.28 + 1);
  ctx.restore();
  ctx.fillStyle = '#FFD700';
  ctx.fillText(displayScore.toLocaleString(), 0, scoreSize * 0.28);
  
  ctx.restore(); // pop scale
  
  // New best indicator (below score in center)
  if (score > bestScore && score > 0) {
    let nbSize = Math.max(7, labelSize - 2);
    ctx.font = `bold ${nbSize}px Nunito, sans-serif`;
    ctx.fillStyle = '#4ECDC4';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    let nbY = panelY2 + panelH - nbSize * 0.8;
    ctx.fillText('★ NEW BEST! ★', midX, nbY);
  }
  
  // --- RIGHT: Sound button ---
  let soundCX = Math.round(panelX + panelW * 0.80);
  let soundR = Math.round(Math.max(11, Math.min(15, panelH * 0.22)));
  
  // Circle bg
  ctx.beginPath();
  ctx.arc(soundCX, midY, soundR, 0, Math.PI * 2);
  ctx.fillStyle = soundEnabled ? 'rgba(78,205,196,0.2)' : 'rgba(255,80,80,0.2)';
  ctx.fill();
  ctx.strokeStyle = soundEnabled ? 'rgba(78,205,196,0.3)' : 'rgba(255,80,80,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  ctx.font = `${Math.round(soundR * 1.1)}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(soundEnabled ? '🔊' : '🔇', soundCX, midY);
  
  window._soundBtn = { x: soundCX, y: midY, r: soundR + 10 };
  
  // --- Divider lines ---
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = 'rgba(140,100,255,1)';
  ctx.lineWidth = 1;
  
  let div1X = Math.round(panelX + panelW * 0.3);
  ctx.beginPath();
  ctx.moveTo(div1X, panelY2 + panelH * 0.2);
  ctx.lineTo(div1X, panelY2 + panelH * 0.8);
  ctx.stroke();
  
  let div2X = Math.round(panelX + panelW * 0.68);
  ctx.beginPath();
  ctx.moveTo(div2X, panelY2 + panelH * 0.2);
  ctx.lineTo(div2X, panelY2 + panelH * 0.8);
  ctx.stroke();
  
  ctx.globalAlpha = 1;
  ctx.restore();
  
  // === XP Bar & Streak (score panelinin altında) ===
  let xpBarY = panelY2 + panelH + 3;
  let xpBarH = Math.max(3, H * 0.005);
  let xpBarW = panelW;
  let xpPct = xpData.xp / getXPForLevel(xpData.level);

  // XP bar bg
  ctx.save();
  drawRoundRect(panelX, xpBarY, xpBarW, xpBarH, xpBarH / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fill();

  // XP fill
  if (xpPct > 0) {
    drawRoundRect(panelX, xpBarY, xpBarW * xpPct, xpBarH, xpBarH / 2);
    let xpGrad = ctx.createLinearGradient(panelX, 0, panelX + xpBarW, 0);
    xpGrad.addColorStop(0, 'rgba(100,200,255,0.8)');
    xpGrad.addColorStop(0.5, 'rgba(140,100,255,0.8)');
    xpGrad.addColorStop(1, 'rgba(200,80,255,0.8)');
    ctx.fillStyle = xpGrad;
    ctx.fill();
  }

  // Level badge
  let lvlSize = Math.max(8, Math.min(11, W * 0.025));
  ctx.font = `bold ${lvlSize}px Fredoka One, sans-serif`;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(180,150,255,0.7)';
  ctx.fillText(`LVL ${xpData.level}`, panelX, xpBarY + xpBarH + lvlSize * 0.7);

  // Streak badge (sağda)
  if (streakData.currentStreak > 1) {
    let streakText = `🔥 ${streakData.currentStreak} GÜN`;
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(255,180,80,0.85)';
    ctx.fillText(streakText, panelX + xpBarW, xpBarY + xpBarH + lvlSize * 0.7);
  }
  ctx.restore();

  // === Combo (drawn outside panel, above board) ===
  if (combo > 1 && comboTimer > 0) {
    let comboAlpha = Math.min(1, comboTimer / 40);
    let comboFS = Math.round(Math.max(12, Math.min(16, W * 0.035)));
    let comboY = BOARD_Y - comboFS - 4;
    let comboSc = 1 + Math.sin(globalTime * 0.15) * 0.08;
    let comboBnc = Math.sin(comboTimer * 0.15) * 3;
    
    ctx.save();
    ctx.globalAlpha = comboAlpha;
    ctx.translate(Math.round(W / 2), Math.round(comboY + comboBnc));
    ctx.scale(comboSc, comboSc);
    
    let comboText = `🔥 COMBO x${combo}!`;
    ctx.font = `bold ${comboFS}px Fredoka One, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    let tw = ctx.measureText(comboText).width;
    let pillW = tw + 20;
    let pillH = comboFS * 1.5;
    drawRoundRect(-pillW / 2, -pillH / 2, pillW, pillH, pillH / 2);
    let cg = ctx.createLinearGradient(0, -pillH / 2, 0, pillH / 2);
    cg.addColorStop(0, 'rgba(255,100,50,0.9)');
    cg.addColorStop(1, 'rgba(255,50,50,0.9)');
    ctx.fillStyle = cg;
    ctx.fill();
    
    ctx.fillStyle = '#fff';
    ctx.fillText(comboText, 0, 1);
    ctx.restore();
  }
}

function getPiecePanel(index) {
  let sidePad = Math.max(6, W * 0.015);
  let totalW = W - sidePad * 2;
  let slotW = totalW / 3;
  let panelAvailH = H - PANEL_Y - Math.max(4, H * 0.008);
  let cx = sidePad + slotW * index + slotW / 2;
  let cy = PANEL_Y + panelAvailH / 2;
  return { cx, cy, slotW, panelAvailH };
}

// Panel piece animations
let panelPieceAnim = [0, 0, 0];
let panelPieceTargetScale = [1, 1, 1];

function drawPiecePanel() {
  let panelAvailH = H - PANEL_Y - Math.max(4, H * 0.008);
  let sidePad = Math.max(6, W * 0.015);

  drawRoundRect(sidePad * 0.5, PANEL_Y - Math.max(4, H * 0.008), W - sidePad, panelAvailH + Math.max(3, H * 0.005), Math.min(18, panelAvailH * 0.12));
  let panelBg = ctx.createLinearGradient(0, PANEL_Y, 0, H);
  panelBg.addColorStop(0, 'rgba(255,255,255,0.04)');
  panelBg.addColorStop(1, 'rgba(255,255,255,0.01)');
  ctx.fillStyle = panelBg;
  ctx.fill();
  ctx.strokeStyle = 'rgba(140,100,255,0.08)';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  for (let i = 0; i < 3; i++) {
    let piece = panelPieces[i];
    if (!piece) continue;
    if (dragging && dragging.pieceIndex === i) continue;
    
    if (panelPieceAnim[i] < 1) {
      panelPieceAnim[i] = Math.min(1, panelPieceAnim[i] + 0.06);
    }
    let entranceScale = easeOutBack(panelPieceAnim[i]);
    
    let { cx, cy, slotW } = getPiecePanel(i);
    
    // Dynamic scale based on available space
    let maxPieceW = slotW * 0.88;
    let maxPieceH = panelAvailH * 0.82;
    let baseSz = Math.max(12, CELL * 0.55);
    let fitScaleW = maxPieceW / (piece.cols * baseSz);
    let fitScaleH = maxPieceH / (piece.rows * baseSz);
    let fitScale = Math.min(1.2, fitScaleW, fitScaleH);
    let scale = fitScale * entranceScale;
    let sz = baseSz * scale;
    let pw = piece.cols * sz;
    let ph = piece.rows * sz;
    let startX = cx - pw / 2;
    let startY = cy - ph / 2;
    
    let placeable = canPieceFitAnywhere(piece);
    let alpha = placeable ? 1 : 0.25;
    
    let floatY = Math.sin(globalTime * 0.04 + i * 2) * 2;
    
    ctx.save();
    ctx.translate(0, floatY);
    
    ctx.globalAlpha = 0.15 * entranceScale;
    drawRoundRect(startX + 2, startY + ph + 2, pw - 4, Math.max(3, sz * 0.15), 3);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fill();
    ctx.globalAlpha = 1;
    
    for (let r = 0; r < piece.rows; r++) {
      for (let c = 0; c < piece.cols; c++) {
        if (piece.shape[r][c]) {
          drawBlock(startX + c * sz, startY + r * sz, sz, piece.color, alpha, false, placeable);
        }
      }
    }
    
    if (!placeable) {
      ctx.globalAlpha = 0.4;
      let xSize = Math.max(14, Math.min(20, sz * 0.8));
      ctx.font = `bold ${xSize}px Fredoka One, sans-serif`;
      ctx.fillStyle = '#FF4444';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('✕', cx, cy);
    }
    
    ctx.restore();
  }
}

function easeOutBack(t) {
  let c1 = 1.70158;
  let c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function easeOutBounce(t) {
  if (t < 1 / 2.75) return 7.5625 * t * t;
  else if (t < 2 / 2.75) return 7.5625 * (t -= 1.5 / 2.75) * t + 0.75;
  else if (t < 2.5 / 2.75) return 7.5625 * (t -= 2.25 / 2.75) * t + 0.9375;
  else return 7.5625 * (t -= 2.625 / 2.75) * t + 0.984375;
}

let dragScale = 0;
let prevDragX = 0, prevDragY = 0;

function drawDraggingPiece() {
  if (!dragging) {
    dragScale = 0;
    return;
  }
  
  // Smooth scale up
  if (dragScale < 1) dragScale = Math.min(1, dragScale + 0.12);
  let sc = easeOutBack(dragScale);
  
  let piece = panelPieces[dragging.pieceIndex];
  if (!piece) return;
  
  let sz = CELL * sc;
  let pw = piece.cols * sz;
  let ph = piece.rows * sz;
  let startX = dragging.x - pw / 2;
  let startY = dragging.y - ph / 2 - CELL * 2;
  
  // Velocity for tilt
  let vx = dragging.x - prevDragX;
  prevDragX = dragging.x;
  prevDragY = dragging.y;
  let tilt = Math.max(-0.08, Math.min(0.08, vx * 0.003));
  
  ctx.save();
  
  // Large shadow
  ctx.globalAlpha = 0.25;
  for (let r = 0; r < piece.rows; r++) {
    for (let c = 0; c < piece.cols; c++) {
      if (piece.shape[r][c]) {
        drawRoundRect(
          startX + c * sz + sz * 0.1 + 5,
          startY + r * sz + sz * 0.1 + 15,
          sz * 0.8, sz * 0.8, sz * 0.18
        );
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.fill();
      }
    }
  }
  ctx.globalAlpha = 1;
  
  // Slight rotation
  let centerX = startX + pw / 2;
  let centerY = startY + ph / 2;
  ctx.translate(centerX, centerY);
  ctx.rotate(tilt);
  ctx.translate(-centerX, -centerY);
  
  for (let r = 0; r < piece.rows; r++) {
    for (let c = 0; c < piece.cols; c++) {
      if (piece.shape[r][c]) {
        drawBlock(startX + c * sz, startY + r * sz, sz, piece.color, 0.92, true);
      }
    }
  }
  
  ctx.restore();
}

// Pre-rendered particle sprites per color
let particleSprites = new Map();

function getParticleSprite(colorIdx, type) {
  let key = `${colorIdx}_${type}`;
  if (particleSprites.has(key)) return particleSprites.get(key);
  
  let c = BLOCK_COLORS[colorIdx % BLOCK_COLORS.length];
  let sz = 32; // base sprite size
  let margin = type === 'circle' ? 20 : 4;
  let canvSz = sz + margin * 2;
  
  let oc = document.createElement('canvas');
  oc.width = canvSz;
  oc.height = canvSz;
  let ox = oc.getContext('2d');
  let cx = canvSz / 2, cy = canvSz / 2;
  let half = sz / 2;
  
  if (type === 'star') {
    ox.shadowColor = c.glow;
    ox.shadowBlur = 8;
    ox.beginPath();
    for (let i = 0; i < 5; i++) {
      let angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
      let px = cx + Math.cos(angle) * half;
      let py = cy + Math.sin(angle) * half;
      if (i === 0) ox.moveTo(px, py);
      else ox.lineTo(px, py);
    }
    ox.closePath();
    ox.fillStyle = c.light;
    ox.fill();
  } else if (type === 'square') {
    ox.beginPath();
    rrPath(ox, cx - half, cy - half, sz, sz, sz * 0.2);
    ox.closePath();
    let sqGrad = ox.createLinearGradient(cx - half, cy - half, cx + half, cy + half);
    sqGrad.addColorStop(0, c.light);
    sqGrad.addColorStop(1, c.main);
    ox.fillStyle = sqGrad;
    ox.fill();
  } else if (type === 'spark') {
    ox.beginPath();
    ox.moveTo(cx, cy - half);
    ox.lineTo(cx, cy + half);
    ox.moveTo(cx - half, cy);
    ox.lineTo(cx + half, cy);
    ox.strokeStyle = c.light;
    ox.lineWidth = 2;
    ox.stroke();
  } else {
    // circle with glow
    let circGrad = ox.createRadialGradient(cx, cy, 0, cx, cy, half);
    circGrad.addColorStop(0, c.light);
    circGrad.addColorStop(1, c.main);
    ox.beginPath();
    ox.arc(cx, cy, half, 0, Math.PI * 2);
    ox.fillStyle = circGrad;
    ox.fill();
    
    ox.globalAlpha = 0.4;
    let glowGrad = ox.createRadialGradient(cx, cy, 0, cx, cy, half * 2.5);
    glowGrad.addColorStop(0, c.glow);
    glowGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ox.beginPath();
    ox.arc(cx, cy, half * 2.5, 0, Math.PI * 2);
    ox.fillStyle = glowGrad;
    ox.fill();
  }
  
  let sprite = { canvas: oc, size: canvSz, half: canvSz / 2, baseSize: sz };
  particleSprites.set(key, sprite);
  return sprite;
}

function drawParticles() {
  // Batch by type to reduce state changes
  for (let p of particles) {
    if (p.type === 'ring') {
      // Rings can't be cached (dynamic size)
      let c = BLOCK_COLORS[p.color % BLOCK_COLORS.length];
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.strokeStyle = c.light;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.restore();
      continue;
    }
    
    let sprite = getParticleSprite(p.color, p.type);
    let scale = (p.size * 2) / sprite.baseSize;
    
    if (scale < 0.05 || p.alpha < 0.02) continue;
    
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    ctx.scale(scale, scale);
    ctx.drawImage(sprite.canvas, -sprite.half, -sprite.half);
    ctx.restore();
  }
}

function drawStar(x, y, size, colorIdx) {
  let c = BLOCK_COLORS[colorIdx % BLOCK_COLORS.length];
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    let angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
    let px = x + Math.cos(angle) * size;
    let py = y + Math.sin(angle) * size;
    if (i === 0) ctx.moveTo(px, py);
    else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fillStyle = c.light;
  ctx.fill();
}

function drawFloatingTexts() {
  for (let ft of floatingTexts) {
    ctx.save();
    ctx.globalAlpha = ft.alpha;
    
    let scale = ft.scale || 1;
    // Responsive font clamping
    let fontSize = Math.max(12, Math.min(ft.size, W * 0.07));
    
    ctx.translate(ft.x, ft.y);
    ctx.scale(scale, scale);
    
    ctx.font = `bold ${fontSize}px Fredoka One, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 4;
    ctx.lineJoin = 'round';
    ctx.strokeText(ft.text, 0, 0);
    
    let tGrad = ctx.createLinearGradient(0, -fontSize / 2, 0, fontSize / 2);
    if (ft.color === '#FFD700') {
      tGrad.addColorStop(0, '#FFEC8B');
      tGrad.addColorStop(0.5, '#FFD700');
      tGrad.addColorStop(1, '#FFA500');
    } else {
      tGrad.addColorStop(0, '#7FFFDF');
      tGrad.addColorStop(1, ft.color);
    }
    ctx.fillStyle = tGrad;
    ctx.shadowColor = ft.color;
    ctx.shadowBlur = 15;
    ctx.fillText(ft.text, 0, 0);
    
    ctx.restore();
  }
}

let gameOverParticles = [];

function spawnGameOverParticles() {
  for (let i = 0; i < 50; i++) {
    gameOverParticles.push({
      x: Math.random() * W,
      y: H + 20,
      vx: (Math.random() - 0.5) * 3,
      vy: -3 - Math.random() * 6,
      size: 3 + Math.random() * 6,
      color: Math.floor(Math.random() * BLOCK_COLORS.length),
      alpha: 1,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.15,
      life: 80 + Math.random() * 60
    });
  }
}

function drawGameOver() {
  if (!gameOver) return;
  
  ctx.save();
  ctx.globalAlpha = gameOverAlpha;
  
  let vigGrad = ctx.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, Math.max(W, H) * 0.7);
  vigGrad.addColorStop(0, 'rgba(0,0,0,0.5)');
  vigGrad.addColorStop(1, 'rgba(0,0,0,0.85)');
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, W, H);
  
  for (let p of gameOverParticles) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.04;
    p.rotation += p.rotSpeed;
    p.life--;
    p.alpha = Math.max(0, p.life / 100);
    
    ctx.save();
    ctx.globalAlpha = p.alpha * gameOverAlpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rotation);
    let pc = BLOCK_COLORS[p.color];
    drawRoundRect(-p.size / 2, -p.size / 2, p.size, p.size, p.size * 0.2);
    ctx.fillStyle = pc.main;
    ctx.fill();
    ctx.restore();
  }
  gameOverParticles = gameOverParticles.filter(p => p.life > 0);
  
  // Responsive panel sizing
  let slideProgress = Math.min(1, gameOverAlpha * 1.5);
  let slideEase = easeOutBack(slideProgress);
  
  let pw2 = Math.min(W * 0.88, 440);
  let ph2 = Math.min(H * 0.42, 300);
  let px2 = (W - pw2) / 2;
  let py2 = H / 2 - ph2 / 2 - H * 0.02;
  let slideY = py2 - 50 + 50 * slideEase;

  let goTitleSize = Math.max(18, Math.min(36, pw2 * 0.1));
  let goScoreLabelSize = Math.max(9, Math.min(14, pw2 * 0.038));
  let goScoreSize = Math.max(24, Math.min(46, pw2 * 0.13));
  let goBtnFontSize = Math.max(12, Math.min(20, pw2 * 0.055));
  let goBestSize = Math.max(9, Math.min(14, pw2 * 0.038));

  let btnW = Math.min(Math.max(140, pw2 * 0.65), pw2 * 0.8);
  let btnH = Math.min(Math.max(40, ph2 * 0.17), 58);
  let cornerR = Math.min(28, ph2 * 0.1);
  
  ctx.save();
  ctx.translate(0, slideY - py2);
  
  // Panel shadow (layered, no shadowBlur)
  for (let i = 3; i >= 0; i--) {
    let ex = i * 6;
    drawRoundRect(px2 - ex, py2 - ex + 6 + i * 2, pw2 + ex * 2, ph2 + ex * 2, cornerR + ex);
    ctx.fillStyle = `rgba(0,0,0,${0.08 * (4 - i)})`;
    ctx.fill();
  }
  drawRoundRect(px2, py2, pw2, ph2, cornerR);
  let goPanelGrad = ctx.createLinearGradient(px2, py2, px2, py2 + ph2);
  goPanelGrad.addColorStop(0, '#352170');
  goPanelGrad.addColorStop(0.5, '#251555');
  goPanelGrad.addColorStop(1, '#1a0d40');
  ctx.fillStyle = goPanelGrad;
  ctx.fill();
  
  ctx.strokeStyle = 'rgba(255,180,50,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();
  
  drawRoundRect(px2 + 4, py2 + 4, pw2 - 8, ph2 - 8, Math.max(0, cornerR - 4));
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // Game Over
  ctx.font = `bold ${goTitleSize}px Fredoka One, sans-serif`;
  ctx.textAlign = 'center';
  let goGrad2 = ctx.createLinearGradient(W / 2 - 80, py2 + ph2 * 0.15, W / 2 + 80, py2 + ph2 * 0.25);
  goGrad2.addColorStop(0, '#FF6B6B');
  goGrad2.addColorStop(0.5, '#FF8E8E');
  goGrad2.addColorStop(1, '#FF6B6B');
  ctx.fillStyle = goGrad2;
  // Glow layer
  ctx.save();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = 'rgba(255,80,80,0.6)';
  ctx.fillText('GAME OVER', W / 2 + 1, py2 + ph2 * 0.2 + 1);
  ctx.restore();
  ctx.fillStyle = goGrad2;
  ctx.fillText('GAME OVER', W / 2, py2 + ph2 * 0.2);
  
  // Divider
  ctx.beginPath();
  ctx.moveTo(px2 + 30, py2 + ph2 * 0.28);
  ctx.lineTo(px2 + pw2 - 30, py2 + ph2 * 0.28);
  let divGrad = ctx.createLinearGradient(px2 + 30, 0, px2 + pw2 - 30, 0);
  divGrad.addColorStop(0, 'rgba(255,255,255,0)');
  divGrad.addColorStop(0.5, 'rgba(255,255,255,0.2)');
  divGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.strokeStyle = divGrad;
  ctx.lineWidth = 1;
  ctx.stroke();
  
  // Score label
  ctx.font = `bold ${goScoreLabelSize}px Nunito, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillText('YOUR SCORE', W / 2, py2 + ph2 * 0.38);
  
  // Score
  ctx.font = `bold ${goScoreSize}px Fredoka One, sans-serif`;
  let scoreGrad2 = ctx.createLinearGradient(W / 2 - 50, py2 + ph2 * 0.4, W / 2 + 50, py2 + ph2 * 0.58);
  scoreGrad2.addColorStop(0, '#FFEC8B');
  scoreGrad2.addColorStop(0.5, '#FFD700');
  scoreGrad2.addColorStop(1, '#FFA500');
  ctx.save();
  ctx.globalAlpha = 0.35;
  ctx.fillStyle = 'rgba(255,215,0,0.7)';
  ctx.fillText(score.toLocaleString(), W / 2 + 1, py2 + ph2 * 0.56 + 1);
  ctx.restore();
  ctx.fillStyle = scoreGrad2;
  ctx.fillText(score.toLocaleString(), W / 2, py2 + ph2 * 0.56);
  
  // Best
  if (score >= bestScore && score > 0) {
    ctx.font = `bold ${goBestSize}px Fredoka One, sans-serif`;
    ctx.fillStyle = '#4ECDC4';
    ctx.fillText('⭐ NEW BEST! ⭐', W / 2, py2 + ph2 * 0.66);
  }
  
  // Button
  let btnX2 = W / 2 - btnW / 2;
  let btnY2 = py2 + ph2 - btnH - ph2 * 0.08;
  let btnPulse = 1 + Math.sin(globalTime * 0.08) * 0.03;
  
  ctx.save();
  ctx.translate(W / 2, btnY2 + btnH / 2);
  ctx.scale(btnPulse, btnPulse);
  ctx.translate(-W / 2, -(btnY2 + btnH / 2));
  
  // Button glow (layered)
  for (let i = 2; i >= 0; i--) {
    let ex = i * 4;
    drawRoundRect(btnX2 - ex, btnY2 - ex, btnW + ex * 2, btnH + ex * 2, btnH / 2 + ex);
    ctx.fillStyle = `rgba(78,205,196,${0.06 * (3 - i)})`;
    ctx.fill();
  }
  drawRoundRect(btnX2, btnY2, btnW, btnH, btnH / 2);
  let btnGrad2 = ctx.createLinearGradient(btnX2, btnY2, btnX2, btnY2 + btnH);
  btnGrad2.addColorStop(0, '#5DDFD6');
  btnGrad2.addColorStop(0.5, '#4ECDC4');
  btnGrad2.addColorStop(1, '#38B2A9');
  ctx.fillStyle = btnGrad2;
  ctx.fill();
  
  drawRoundRect(btnX2 + 3, btnY2 + 2, btnW - 6, btnH / 2 - 2, btnH / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.fill();
  
  ctx.font = `bold ${goBtnFontSize}px Fredoka One, sans-serif`;
  ctx.fillStyle = '#fff';
  ctx.fillText('▶  PLAY AGAIN', W / 2, btnY2 + btnH * 0.62);
  
  ctx.restore(); // button
  ctx.restore(); // slide
  ctx.restore(); // main
}

// Game logic
function canPlacePiece(piece, row, col) {
  for (let r = 0; r < piece.rows; r++) {
    for (let c = 0; c < piece.cols; c++) {
      if (piece.shape[r][c]) {
        let br = row + r;
        let bc = col + c;
        if (br < 0 || br >= ROWS || bc < 0 || bc >= COLS) return false;
        if (board[br][bc] !== 0) return false;
      }
    }
  }
  return true;
}

// Placement check cache
var placementCacheVersion = 0;
var placementCache = new Map();

function invalidatePlacementCache() {
  if (!placementCache) placementCache = new Map();
  placementCacheVersion++;
  placementCache.clear();
}

function canPieceFitAnywhere(piece) {
  // Lazy init guard
  if (typeof placementCache === 'undefined' || !placementCache) {
    placementCache = new Map();
  }
  if (typeof placementCacheVersion === 'undefined') {
    placementCacheVersion = 0;
  }

  // Create shape signature for cache key
  let shapeKey = '';
  for (let r = 0; r < piece.rows; r++) {
    for (let c = 0; c < piece.cols; c++) {
      shapeKey += piece.shape[r][c];
    }
  }
  let cacheKey = `${shapeKey}_${placementCacheVersion}`;

  if (placementCache.has(cacheKey)) return placementCache.get(cacheKey);

  let result = false;
  outer:
  for (let r = 0; r <= ROWS - piece.rows; r++) {
    for (let c = 0; c <= COLS - piece.cols; c++) {
      if (canPlacePiece(piece, r, c)) {
        result = true;
        break outer;
      }
    }
  }

  placementCache.set(cacheKey, result);
  return result;
}

function placePiece(piece, row, col) {
  invalidatePlacementCache();
  
  for (let r = 0; r < piece.rows; r++) {
    for (let c = 0; c < piece.cols; c++) {
      if (piece.shape[r][c]) {
        board[row + r][col + c] = piece.color + 1;
        triggerLandingAnim(row + r, col + c);
      }
    }
  }
  
  // Score pop
  let blockCount = 0;
  for (let r = 0; r < piece.rows; r++)
    for (let c = 0; c < piece.cols; c++)
      if (piece.shape[r][c]) blockCount++;
  
  score += blockCount;
  scorePopScale = 1.3;
  updateDailyGoal('blocks', blockCount);
  streakData.totalBlocksPlaced += blockCount;
  addXP(blockCount * 2);
  
  // Landing particles - wave effect with per-cell sound
  let delay = 0;
  for (let r = 0; r < piece.rows; r++) {
    for (let c = 0; c < piece.cols; c++) {
      if (piece.shape[r][c]) {
        let px2 = BOARD_X + (col + c) * CELL + CELL / 2;
        let py2 = BOARD_Y + (row + r) * CELL + CELL / 2;
        let cr = row + r, cc = col + c;
        
        setTimeout(() => {
          spawnParticles(px2, py2, piece.color, 4);
          particles.push({
            x: px2, y: py2,
            vx: 0, vy: 0,
            size: CELL * 0.3,
            color: piece.color,
            alpha: 0.6,
            type: 'ring',
            rotation: 0,
            rotSpeed: 0,
            life: 20
          });
          playBlockLand(cr, cc);
        }, delay);
        delay += 30;
      }
    }
  }
  
  // Small screen shake
  shakeAmount = 2;
}

function checkAndClearLines() {
  let rowsToClear = [];
  let colsToClear = [];
  
  for (let r = 0; r < ROWS; r++) {
    let full = true;
    for (let c = 0; c < COLS; c++) {
      if (board[r][c] === 0) { full = false; break; }
    }
    if (full) rowsToClear.push(r);
  }
  
  for (let c = 0; c < COLS; c++) {
    let full = true;
    for (let r = 0; r < ROWS; r++) {
      if (board[r][c] === 0) { full = false; break; }
    }
    if (full) colsToClear.push(c);
  }
  
  let totalLines = rowsToClear.length + colsToClear.length;
  
  if (totalLines > 0) {
    flashRows = [...rowsToClear];
    flashCols = [...colsToClear];
    flashTimer = 25;
    
    // Combo
    combo++;
    comboTimer = 150;
    
    // Score bonus - exponential for multiple lines
    let lineScore = totalLines * COLS * 10;
    let multiBonus = totalLines > 1 ? totalLines * totalLines * 15 : 0;
    let comboBonus = combo > 1 ? combo * combo * 10 : 0;
    let totalScore = lineScore + multiBonus + comboBonus;
    score += totalScore;
    scorePopScale = 1.4 + totalLines * 0.1;

    // Daily goal & XP tracking
    updateDailyGoal('score', totalScore);
    updateDailyGoal('lines', totalLines);
    if (combo > streakData.bestCombo) {
      streakData.bestCombo = combo;
      saveStreakData();
    }
    updateDailyGoal('combo', combo);
    streakData.totalLinesCleared += totalLines;
    saveStreakData();
    addXP(totalLines * 25 + (combo > 1 ? combo * 15 : 0));
    
    // Shake scales with lines
    shakeAmount = 6 + totalLines * 4 + combo * 2;
    
    // Collect cells to clear
    let clearCells = new Set();
    
    for (let r of rowsToClear) {
      for (let c = 0; c < COLS; c++) {
        clearCells.add(`${r},${c}`);
      }
    }
    for (let c of colsToClear) {
      for (let r = 0; r < ROWS; r++) {
        clearCells.add(`${r},${c}`);
      }
    }
    
    // Staggered particle explosions with per-cell destruction sound
    let cellArray = Array.from(clearCells);
    let delayStep = Math.max(10, 150 / cellArray.length);
    
    cellArray.forEach((key, idx) => {
      let [r, c] = key.split(',').map(Number);
      let px2 = BOARD_X + c * CELL + CELL / 2;
      let py2 = BOARD_Y + r * CELL + CELL / 2;
      let color = board[r][c] > 0 ? board[r][c] - 1 : 0;
      
      setTimeout(() => {
        spawnExplosion(px2, py2, color, 8);
        boardCellScale[r][c] = 1.5;
      }, idx * delayStep);
      
      // Per-cell sound with scheduled timing (no setTimeout for audio)
      playCellDestroy(r, c, idx * delayStep / 1000);
    });
    
    // Floating text with scale animation
    let textY = BOARD_Y + CELL * ROWS / 2;
    
    if (totalLines >= 3) {
      floatingTexts.push({
        x: W / 2, y: textY - 30,
        text: totalLines >= 4 ? '💥 AMAZING! 💥' : '✨ GREAT! ✨',
        color: '#FFD700', size: 26,
        alpha: 1, vy: -1.5,
        scale: 1.3
      });
    }
    
    let scoreText = `+${totalScore}`;
    floatingTexts.push({
      x: W / 2, y: textY + (totalLines >= 3 ? 10 : 0),
      text: scoreText,
      color: totalLines >= 2 ? '#FFD700' : '#4ECDC4',
      size: 20 + totalLines * 4,
      alpha: 1, vy: -2,
      scale: 1
    });
    
    if (combo > 1) {
      floatingTexts.push({
        x: W / 2, y: textY + 35,
        text: `COMBO x${combo}!`,
        color: '#FF6B6B', size: 18,
        alpha: 1, vy: -1.8,
        scale: 1
      });
    }
    
    // Screen flash
    screenFlash = 0.3 + totalLines * 0.1;
    
    // Delayed clear with animation
    setTimeout(() => {
      for (let key of clearCells) {
        let [r, c] = key.split(',').map(Number);
        board[r][c] = 0;
      }
      invalidatePlacementCache();
    }, Math.min(300, cellArray.length * delayStep + 50));
    
  } else {
    combo = 0;
  }
  
  return totalLines;
}

function getXPForLevel(lvl) { return lvl * lvl * 100; }

  xpData.xp += amount;
  let leveledUp = false;
  while (xpData.xp >= getXPForLevel(xpData.level)) {
    xpData.xp -= getXPForLevel(xpData.level);
    xpData.level++;

  }
  saveXP();
  if (leveledUp) showLevelUp(xpData.level);
}

function drawNotifications() {
  if (notifications.length === 0) return;

  let baseY = BOARD_Y + CELL * ROWS + 10;
  if (PANEL_Y > 0) baseY = Math.min(baseY, PANEL_Y - 60);

  let notifW = Math.min(W * 0.75, 280);
  let notifH = Math.max(44, H * 0.065);
  let notifX = (W - notifW) / 2;

  for (let i = notifications.length - 1; i >= 0; i--) {
    let n = notifications[i];
    let progress = 1 - n.life / n.maxLife;

    // Slide in from bottom
    if (progress < 0.15) {
      n.alpha = progress / 0.15;
      n.y = (1 - n.alpha) * 30;
    } else if (progress > 0.75) {
      n.alpha = 1 - (progress - 0.75) / 0.25;
      n.y = 0;
    } else {
      n.alpha = 1;
      n.y = 0;
    }

    n.life--;

    let ny = baseY - i * (notifH + 6) - n.y;

    ctx.save();
    ctx.globalAlpha = n.alpha * 0.95;

    // Shadow
    drawRoundRect(notifX + 2, ny + 4, notifW, notifH, notifH * 0.3);
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.fill();

    // Background
    drawRoundRect(notifX, ny, notifW, notifH, notifH * 0.3);
    let ng = ctx.createLinearGradient(notifX, ny, notifX + notifW, ny + notifH);
    if (n.type === 'levelup') {
      ng.addColorStop(0, 'rgba(255,200,0,0.92)');
      ng.addColorStop(1, 'rgba(255,140,0,0.92)');
    } else {
      ng.addColorStop(0, 'rgba(60,200,160,0.92)');
      ng.addColorStop(1, 'rgba(40,160,130,0.92)');
    }
    ctx.fillStyle = ng;
    ctx.fill();

    // Shine
    drawRoundRect(notifX + 3, ny + 2, notifW - 6, notifH * 0.45, notifH * 0.25);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fill();

    // Text
    let mainSize = Math.max(11, Math.min(15, notifW * 0.055));
    let subSize = Math.max(9, Math.min(11, notifW * 0.04));
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${mainSize}px Fredoka One, sans-serif`;
    ctx.textBaseline = 'middle';
    ctx.fillText(n.text, notifX + notifW / 2, ny + notifH * 0.38);
    ctx.font = `bold ${subSize}px Nunito, sans-serif`;
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText(n.subtext, notifX + notifW / 2, ny + notifH * 0.7);

    ctx.restore();

    if (n.life <= 0) {
      notifications.splice(i, 1);
    }
  }
}

function checkGameOver() {
  for (let i = 0; i < 3; i++) {
    if (panelPieces[i] && canPieceFitAnywhere(panelPieces[i])) {
      return false;
    }
  }
  return !panelPieces.every(p => p === null);
}

function spawnParticles(x, y, color, count) {
  let types = ['circle', 'square', 'star', 'spark'];
  for (let i = 0; i < count; i++) {
    let angle = Math.random() * Math.PI * 2;
    let speed = 1.5 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 3,
      size: 2 + Math.random() * 6,
      color: color,
      alpha: 1,
      type: types[Math.floor(Math.random() * types.length)],
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.25,
      life: 35 + Math.random() * 40
    });
  }
}

function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    let angle = (i / count) * Math.PI * 2;
    let speed = 3 + Math.random() * 5;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: 3 + Math.random() * 4,
      color: color,
      alpha: 1,
      type: 'circle',
      rotation: 0,
      rotSpeed: 0,
      life: 30 + Math.random() * 25
    });
  }
  // Central flash
  particles.push({
    x, y,
    vx: 0, vy: 0,
    size: CELL * 0.8,
    color: color,
    alpha: 0.8,
    type: 'ring',
    rotation: 0,
    rotSpeed: 0,
    life: 15
  });
}

// Input handling
function getEventPos(e) {
  let rect = canvas.getBoundingClientRect();
  let scaleX = W / rect.width;
  let scaleY = H / rect.height;
  
  if (e.touches) {
    return {
      x: (e.touches[0].clientX - rect.left) * scaleX,
      y: (e.touches[0].clientY - rect.top) * scaleY
    };
  }
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY
  };
}

function findPieceAtPos(px, py) {
  for (let i = 0; i < 3; i++) {
    let piece = panelPieces[i];
    if (!piece) continue;
    
    let { cx, cy, slotW, panelAvailH } = getPiecePanel(i);
    
    // Use slot boundaries for easier touch targets
    let slotLeft = cx - slotW / 2;
    let slotRight = cx + slotW / 2;
    let slotTop = PANEL_Y - 5;
    let slotBottom = PANEL_Y + panelAvailH;
    
    if (px >= slotLeft && px <= slotRight && py >= slotTop && py <= slotBottom) {
      return i;
    }
  }
  return -1;
}

function updateHoverCell() {
  if (!dragging) { hoverCell = null; canPlace = false; return; }
  
  let piece = panelPieces[dragging.pieceIndex];
  if (!piece) { hoverCell = null; canPlace = false; return; }
  
  let sz = CELL;
  let pw = piece.cols * sz;
  let ph = piece.rows * sz;
  let cx = dragging.x - pw / 2;
  let cy = dragging.y - ph / 2 - CELL * 2;
  
  // Find closest cell
  let col = Math.round((cx - BOARD_X) / CELL);
  let row = Math.round((cy - BOARD_Y) / CELL);
  
  // Clamp
  col = Math.max(0, Math.min(COLS - piece.cols, col));
  row = Math.max(0, Math.min(ROWS - piece.rows, row));
  
  // Check if cursor is near the board
  let midX = cx + pw / 2;
  let midY = cy + ph / 2;
  
  if (midX > BOARD_X - CELL && midX < BOARD_X + CELL * COLS + CELL &&
      midY > BOARD_Y - CELL && midY < BOARD_Y + CELL * ROWS + CELL) {
    hoverCell = { row, col };
    canPlace = canPlacePiece(piece, row, col);
  } else {
    hoverCell = null;
    canPlace = false;
  }
}

let lastHoverKey = '';

function onPointerDown(e) {
  e.preventDefault();
  initAudio();
  
  if (gameOver) {
    let pos = getEventPos(e);
    let pw2 = Math.min(W * 0.85, 400);
    let ph2 = Math.min(H * 0.38, 260);
    let px2 = (W - pw2) / 2;
    let py2 = H / 2 - ph2 / 2 - H * 0.03;
    let btnW = Math.min(190, pw2 * 0.7);
    let btnH = Math.min(52, ph2 * 0.2);
    let btnX = W / 2 - btnW / 2;
    let btnY = py2 + ph2 - btnH - ph2 * 0.08;
    
    if (pos.x >= btnX && pos.x <= btnX + btnW && pos.y >= btnY && pos.y <= btnY + btnH) {
      playButtonClick();
      restartGame();
    }
    return;
  }
  
  let pos = getEventPos(e);
  
  // Settings menu open → route clicks there
  if (settingsOpen || settingsAlpha > 0.05) {
    if (handleSettingsClick(pos.x, pos.y)) return;
  }

  // Check settings button
  if (window._settingsBtn) {
    let sb2 = window._settingsBtn;
    let dx2 = pos.x - sb2.x;
    let dy2 = pos.y - sb2.y;
    if (dx2 * dx2 + dy2 * dy2 < sb2.r * sb2.r) {
      settingsOpen = !settingsOpen;
      playButtonClick();
      return;
    }
  }

  // Check sound button
  if (window._soundBtn) {
    let sb = window._soundBtn;
    let dx = pos.x - sb.x;
    let dy = pos.y - sb.y;
    if (dx * dx + dy * dy < sb.r * sb.r) {
      soundEnabled = !soundEnabled;
      settings.sound = soundEnabled;
      saveSettings();
      if (soundEnabled) {
        playTone(800, 0.08, 'sine', 0.1);
      }
      return;
    }
  }
  
  let idx = findPieceAtPos(pos.x, pos.y);
  
  if (idx >= 0 && panelPieces[idx]) {
    playPickup();
    dragging = {
      pieceIndex: idx,
      x: pos.x,
      y: pos.y
    };
    lastHoverKey = '';
    updateHoverCell();
  }
}

function onPointerMove(e) {
  e.preventDefault();
  if (!dragging) return;
  
  let pos = getEventPos(e);
  dragging.x = pos.x;
  dragging.y = pos.y;
  updateHoverCell();
  
  // Hover sound
  if (hoverCell) {
    let key = `${hoverCell.row},${hoverCell.col},${canPlace}`;
    if (key !== lastHoverKey) {
      lastHoverKey = key;
      if (canPlace) {
        playHover();
      }
    }
  } else {
    lastHoverKey = '';
  }
}

function onPointerUp(e) {
  e.preventDefault();
  if (!dragging) return;
  
  if (hoverCell && canPlace) {
    let piece = panelPieces[dragging.pieceIndex];
    let pidx = dragging.pieceIndex;
    
    playPlace();
    placePiece(piece, hoverCell.row, hoverCell.col);
    panelPieces[pidx] = null;
    panelPieceAnim[pidx] = 0;
    
    setTimeout(() => {
      let linesCleared = checkAndClearLines();
      
      if (linesCleared > 0) {
        playClear(linesCleared);
        if (combo > 1) {
          setTimeout(() => playCombo(combo), 150);
        }
        // Achievement sound for clearing 3+ lines at once
        if (linesCleared >= 3) {
          setTimeout(() => playAchievement(), 400);
        }
      }
      
      if (allPanelEmpty()) {
        panelPieceAnim = [0, 0, 0];
        spawnPieces();
        playSpawn();
      }
      
      setTimeout(() => {
        if (checkGameOver()) {
          gameOver = true;
          gameOverAlpha = 0;
          spawnGameOverParticles();
          playGameOver();
          if (score > bestScore) {
            bestScore = score;
            localStorage.setItem('blockBlastBest', bestScore.toString());
          }
          updateDailyGoal('score', 0); // trigger save
          addXP(Math.floor(score / 10));
          streakData.totalGamesPlayed++;
          saveStreakData();
        }
      }, 400);
    }, 300);
  } else if (dragging) {
    // Dropped in invalid spot
    if (hoverCell && !canPlace) {
      playInvalid();
    } else {
      playDrop();
    }
  }
  
  dragging = null;
  hoverCell = null;
  canPlace = false;
  lastHoverKey = '';
}

function restartGame() {
  board = [];
  for (let r = 0; r < ROWS; r++) {
    board[r] = [];
    boardCellScale[r] = [];
    boardCellBounce[r] = [];
    for (let c = 0; c < COLS; c++) {
      board[r][c] = 0;
      boardCellScale[r][c] = 1;
      boardCellBounce[r][c] = 0;
    }
  }
  score = 0;
  displayScore = 0;
  combo = 0;
  comboTimer = 0;
  gameOver = false;
  gameOverAlpha = 0;
  screenFlash = 0;
  shakeAmount = 0;
  flashTimer = 0;
  flashRows = [];
  flashCols = [];
  panelPieces = [null, null, null];
  panelPieceAnim = [0, 0, 0];
  particles = [];
  floatingTexts = [];
  gameOverParticles = [];
  lastHoverKey = '';
  spawnPieces();
  playSpawn();
  checkAndUpdateStreak();
  invalidatePlacementCache();
}

canvas.addEventListener('mousedown', onPointerDown);
canvas.addEventListener('mousemove', onPointerMove);
canvas.addEventListener('mouseup', onPointerUp);
canvas.addEventListener('mouseleave', onPointerUp);
canvas.addEventListener('touchstart', onPointerDown, { passive: false });
canvas.addEventListener('touchmove', onPointerMove, { passive: false });
canvas.addEventListener('touchend', onPointerUp, { passive: false });
canvas.addEventListener('touchcancel', onPointerUp, { passive: false });

function update() {
  globalTime++;
  
  // Shake decay
  if (shakeAmount > 0) {
    shakeAmount *= 0.88;
    if (shakeAmount < 0.2) shakeAmount = 0;
  }
  
  // Flash timer
  if (flashTimer > 0) {
    flashTimer--;
    if (flashTimer <= 0) { flashRows.length = 0; flashCols.length = 0; }
  }
  
  // Combo timer
  if (comboTimer > 0) comboTimer--;
  
  // Screen flash decay
  if (screenFlash > 0) {
    screenFlash *= 0.85;
    if (screenFlash < 0.01) screenFlash = 0;
  }
  
  // Particles - optimized with swap-remove
  let pLen = particles.length;
  let i = 0;
  while (i < pLen) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.12;
    p.vx *= 0.99;
    p.rotation += p.rotSpeed;
    p.life--;
    
    if (p.type === 'ring') {
      p.size *= 1.08;
      p.alpha = p.life > 0 ? p.life / 20 : 0;
    } else {
      p.size *= 0.97;
      p.alpha = p.life > 0 ? p.life / 45 : 0;
    }
    
    // Off-screen culling + death check
    if (p.life <= 0 || p.alpha < 0.01 || p.size < 0.2 ||
        p.x < -50 || p.x > W + 50 || p.y > H + 50) {
      // Swap with last element
      particles[i] = particles[pLen - 1];
      pLen--;
    } else {
      i++;
    }
  }
  particles.length = pLen;
  
  // Adaptive hard cap based on performance
  let pCap = getParticleCap();
  if (particles.length > pCap) {
    particles.length = pCap;
  }
  
  // Floating texts - swap-remove
  let fLen = floatingTexts.length;
  i = 0;
  while (i < fLen) {
    let ft = floatingTexts[i];
    ft.y += ft.vy;
    ft.vy *= 0.97;
    ft.alpha -= 0.012;
    
    if (ft.scale && ft.scale > 1.01) {
      ft.scale += (1 - ft.scale) * 0.05;
    }
    
    if (ft.alpha <= 0) {
      floatingTexts[i] = floatingTexts[fLen - 1];
      fLen--;
    } else {
      i++;
    }
  }
  floatingTexts.length = fLen;
  
  // Game over fade
  if (gameOver && gameOverAlpha < 1) {
    gameOverAlpha = Math.min(1, gameOverAlpha + 0.025);
  }
}

// Performance monitoring & adaptive quality
let resizeCounter = 0;
let frameTimes = [];
let avgFrameTime = 16;
let lastFrameStamp = 0;
let qualityLevel = 2; // 0=low, 1=med, 2=high (never reduces visual quality, only internal)

function measurePerformance(now) {
  if (lastFrameStamp > 0) {
    let dt = now - lastFrameStamp;
    frameTimes.push(dt);
    if (frameTimes.length > 60) frameTimes.shift();
    
    // Recalc average every 30 frames
    if (frameTimes.length % 30 === 0) {
      let sum = 0;
      for (let t of frameTimes) sum += t;
      avgFrameTime = sum / frameTimes.length;
      
      // Adjust internal limits (NOT visual quality)
      if (avgFrameTime > 25) {
        // Reduce particle cap slightly
        qualityLevel = 0;
      } else if (avgFrameTime > 19) {
        qualityLevel = 1;
      } else {
        qualityLevel = 2;
      }
    }
  }
  lastFrameStamp = now;
}

function getParticleCap() {
  return qualityLevel === 0 ? 200 : qualityLevel === 1 ? 300 : 400;
}

function getStarUpdateInterval() {
  return qualityLevel === 0 ? 5 : qualityLevel === 1 ? 3 : 2;
}

function gameLoop(now) {
  measurePerformance(now || performance.now());
  
  resizeCounter++;
  if (resizeCounter % 15 === 0) resize();
  
  update();
  
  // Viewport clipping - only clear visible area
  ctx.clearRect(0, 0, W, H);
  
  drawBackground();
  drawScore();
  drawSettingsButton();
  drawBoard();
  drawPiecePanel();
  drawDraggingPiece();
  
  if (particles.length > 0) drawParticles();
  if (floatingTexts.length > 0) drawFloatingTexts();
  
  // Screen flash overlay
  if (screenFlash > 0.005) {
    ctx.save();
    ctx.globalAlpha = Math.min(screenFlash, 0.6);
    let flashGrad = ctx.createRadialGradient(W / 2, BOARD_Y + CELL * ROWS / 2, 0, W / 2, BOARD_Y + CELL * ROWS / 2, W);
    flashGrad.addColorStop(0, 'rgba(255,255,255,0.8)');
    flashGrad.addColorStop(0.5, 'rgba(255,255,200,0.4)');
    flashGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = flashGrad;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }
  
  if (gameOver) drawGameOver();
  drawNotifications();
  drawSettings();
  
  requestAnimationFrame(gameLoop);
}

// Initial resize
resize();
requestAnimationFrame(gameLoop);
</script>
