<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Block Blast!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;900&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    width: 100%;
    height: 100%;
    background: #0a0118;
    overflow: hidden;
    font-family: 'Fredoka One', 'Nunito', sans-serif;
    user-select: none;
    display: flex;
    justify-content: center;
    align-items: center;
    position: fixed;
    top: 0;
    left: 0;
  }

  canvas {
    display: block;
    touch-action: none;
    max-width: 100vw;
    max-height: 100vh;
  }

  #gameCanvas {
    border-radius: 0;
  }

  @media (min-width: 520px) {
    #gameCanvas {
      border-radius: 16px;
      box-shadow: 0 0 60px rgba(100,50,200,0.3), 0 0 120px rgba(50,20,100,0.2);
    }
  }

  /* Yatay mod: canvas'ı dikey ortala */
  @media (orientation: landscape) {
    body {
      align-items: center;
      justify-content: center;
    }
    #gameCanvas {
      max-height: 100vh;
      max-width: 100vw;
    }
  }

  /* Çok kısa ekranlar */
  @media (max-height: 500px) {
    body {
      align-items: flex-start;
      overflow-y: auto;
    }
  }

  /* Büyük ekranlar: canvas gölge+köşe */
  @media (min-width: 768px) {
    #gameCanvas {
      border-radius: 20px;
      box-shadow:
        0 0 0 1px rgba(140,100,255,0.15),
        0 8px 32px rgba(0,0,0,0.5),
        0 0 80px rgba(100,50,200,0.25),
        0 0 160px rgba(50,20,100,0.15);
    }
  }

  /* Akıllı tahta / TV gibi çok büyük ekranlar */
  @media (min-width: 1400px) {
    #gameCanvas {
      border-radius: 24px;
      box-shadow:
        0 0 0 2px rgba(140,100,255,0.2),
        0 16px 64px rgba(0,0,0,0.6),
        0 0 120px rgba(100,50,200,0.3),
        0 0 240px rgba(50,20,100,0.2);
    }
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
let ctx = canvas.getContext('2d');

// ===== SOUND ENGINE =====
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundEnabled = true;

// Master volume & compressor chain
let masterGain = null;
let compressor = null;
let reverbNode = null;
let reverbGain = null;

function initAudio() {
  if (!audioCtx) {
    try {
      audioCtx = new AudioCtx();
      
      // Compressor for clean mixing
      compressor = audioCtx.createDynamicsCompressor();
      compressor.threshold.value = -24;
      compressor.knee.value = 12;
      compressor.ratio.value = 6;
      compressor.attack.value = 0.003;
      compressor.release.value = 0.15;
      
      // Master gain
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.7;
      
      // Convolution-style reverb via delay feedback
      reverbGain = audioCtx.createGain();
      reverbGain.gain.value = 0.15;
      
      let reverbDelay = audioCtx.createDelay();
      reverbDelay.delayTime.value = 0.08;
      let reverbFeedback = audioCtx.createGain();
      reverbFeedback.gain.value = 0.25;
      let reverbFilter = audioCtx.createBiquadFilter();
      reverbFilter.type = 'lowpass';
      reverbFilter.frequency.value = 3000;
      
      reverbGain.connect(reverbDelay);
      reverbDelay.connect(reverbFilter);
      reverbFilter.connect(reverbFeedback);
      reverbFeedback.connect(reverbDelay);
      reverbFilter.connect(masterGain);
      
      // Chain: source -> compressor -> masterGain -> destination
      //                            \-> reverbGain -> reverb loop -> masterGain
      compressor.connect(masterGain);
      compressor.connect(reverbGain);
      masterGain.connect(audioCtx.destination);
      
    } catch(e) {
      soundEnabled = false;
    }
  }
  if (audioCtx && audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
}

// Optimized node pool to reduce GC pressure
const MAX_ACTIVE_SOUNDS = 30;
let activeSoundCount = 0;

function playTone(freq, duration, type, volume, detune, panVal, delayTime) {
  if (!soundEnabled || !audioCtx || !compressor) return;
  if (activeSoundCount >= MAX_ACTIVE_SOUNDS) return;
  
  try {
    let t = audioCtx.currentTime + (delayTime || 0);
    let vol = volume || 0.15;
    
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t);
    if (detune) osc.detune.setValueAtTime(detune, t);
    
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(vol, t + 0.005); // 5ms attack to avoid click
    gain.gain.setValueAtTime(vol, t + duration * 0.3);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    
    // Stereo panning
    if (panVal !== undefined && panVal !== 0 && audioCtx.createStereoPanner) {
      let panner = audioCtx.createStereoPanner();
      panner.pan.setValueAtTime(Math.max(-1, Math.min(1, panVal)), t);
      osc.connect(gain);
      gain.connect(panner);
      panner.connect(compressor);
    } else {
      osc.connect(gain);
      gain.connect(compressor);
    }
    
    activeSoundCount++;
    osc.onended = () => { activeSoundCount--; };
    
    osc.start(t);
    osc.stop(t + duration + 0.01);
  } catch(e) {}
}

// Enhanced multi-oscillator tone for richer sounds
function playRichTone(freq, duration, volume, harmonics, panVal, delayTime) {
  if (!soundEnabled || !audioCtx || !compressor) return;
  
  let t = audioCtx.currentTime + (delayTime || 0);
  let vol = volume || 0.12;
  
  try {
    // Fundamental
    playTone(freq, duration, 'sine', vol * 0.6, 0, panVal, delayTime);
    
    // Harmonics
    if (harmonics) {
      for (let h of harmonics) {
        playTone(freq * h.ratio, duration * (h.durMul || 0.7), h.type || 'sine', 
                 vol * (h.vol || 0.15), h.detune || 0, panVal, delayTime);
      }
    }
  } catch(e) {}
}

// Noise burst generator for percussive textures
function playNoise(duration, volume, filterFreq, filterQ, panVal, delayTime) {
  if (!soundEnabled || !audioCtx || !compressor) return;
  if (activeSoundCount >= MAX_ACTIVE_SOUNDS) return;
  
  try {
    let t = audioCtx.currentTime + (delayTime || 0);
    let bufferSize = audioCtx.sampleRate * duration;
    let buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    let data = buffer.getChannelData(0);
    
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
    }
    
    let source = audioCtx.createBufferSource();
    source.buffer = buffer;
    
    let filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = filterFreq || 2000;
    filter.Q.value = filterQ || 1;
    
    let gain = audioCtx.createGain();
    gain.gain.setValueAtTime(volume || 0.05, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    
    source.connect(filter);
    filter.connect(gain);
    
    if (panVal !== undefined && audioCtx.createStereoPanner) {
      let panner = audioCtx.createStereoPanner();
      panner.pan.value = panVal;
      gain.connect(panner);
      panner.connect(compressor);
    } else {
      gain.connect(compressor);
    }
    
    activeSoundCount++;
    source.onended = () => { activeSoundCount--; };
    source.start(t);
  } catch(e) {}
}

// Frequency sweep for woosh/slide effects
function playSweep(startFreq, endFreq, duration, type, volume, panVal, delayTime) {
  if (!soundEnabled || !audioCtx || !compressor) return;
  if (activeSoundCount >= MAX_ACTIVE_SOUNDS) return;
  
  try {
    let t = audioCtx.currentTime + (delayTime || 0);
    
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(startFreq, t);
    osc.frequency.exponentialRampToValueAtTime(Math.max(20, endFreq), t + duration);
    
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(volume || 0.1, t + 0.005);
    gain.gain.setValueAtTime(volume || 0.1, t + duration * 0.2);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    
    osc.connect(gain);
    
    if (panVal !== undefined && audioCtx.createStereoPanner) {
      let panner = audioCtx.createStereoPanner();
      panner.pan.value = panVal;
      gain.connect(panner);
      panner.connect(compressor);
    } else {
      gain.connect(compressor);
    }
    
    activeSoundCount++;
    osc.onended = () => { activeSoundCount--; };
    osc.start(t);
    osc.stop(t + duration + 0.01);
  } catch(e) {}
}

// Musical scale helpers
const NOTE_FREQS = {
  C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88,
  C5: 523.25, D5: 587.33, E5: 659.25, F5: 698.46, G5: 783.99, A5: 880.00, B5: 987.77,
  C6: 1046.50, D6: 1174.66, E6: 1318.51
};

function semitoneToFreq(base, semitones) {
  return base * Math.pow(2, semitones / 12);
}

// ====== SOUND EFFECTS ======

function playPickup() {
  // Bright pluck with sparkle
  playRichTone(NOTE_FREQS.E5, 0.1, 0.1, [
    { ratio: 2, vol: 0.2, type: 'sine', durMul: 0.5 },
    { ratio: 3, vol: 0.08, type: 'sine', durMul: 0.3 }
  ], 0);
  playTone(NOTE_FREQS.G5, 0.08, 'sine', 0.06, 3, 0.2, 0.04);
  playNoise(0.04, 0.03, 6000, 2, 0);
}

function playPlace() {
  // Satisfying thump + melodic confirmation
  // Low thump
  playTone(80, 0.15, 'sine', 0.15, 0, 0);
  playNoise(0.06, 0.06, 800, 3, 0);
  
  // Melodic notes: C-E-G (major chord arpeggio)
  playRichTone(NOTE_FREQS.C5, 0.15, 0.09, [
    { ratio: 2, vol: 0.12, type: 'triangle', durMul: 0.6 }
  ], -0.2, 0.02);
  
  playRichTone(NOTE_FREQS.E5, 0.12, 0.08, [
    { ratio: 2, vol: 0.1, type: 'triangle', durMul: 0.5 }
  ], 0, 0.06);
  
  playRichTone(NOTE_FREQS.G5, 0.18, 0.09, [
    { ratio: 2, vol: 0.12, type: 'triangle', durMul: 0.6 },
    { ratio: 3, vol: 0.04, type: 'sine', durMul: 0.3 }
  ], 0.2, 0.1);
  
  // Subtle shimmer
  playNoise(0.12, 0.02, 5000, 0.5, 0, 0.08);
}

function playDrop() {
  // Piece returned - soft descending tone
  playSweep(400, 150, 0.2, 'sine', 0.08, 0);
  playTone(120, 0.15, 'triangle', 0.06, 0, 0, 0.05);
  playNoise(0.08, 0.03, 600, 2, 0, 0.02);
}

function playClear(lineCount) {
  // Epic ascending scale based on lines cleared
  // More lines = more notes, higher pitch, richer sound
  
  let scales = {
    1: [0, 4, 7],                    // C-E-G (major triad)
    2: [0, 4, 7, 12],               // C-E-G-C (octave)
    3: [0, 4, 7, 11, 12],           // C-E-G-B-C (major 7th)
    4: [0, 4, 7, 12, 16, 19],       // Full two-octave arpeggio
  };
  
  let notePattern = scales[Math.min(lineCount, 4)] || scales[4];
  let baseFreq = 440 + (lineCount - 1) * 60; // Higher base for more lines
  let noteSpacing = Math.max(50, 100 - lineCount * 10);
  
  notePattern.forEach((semitone, i) => {
    let freq = semitoneToFreq(baseFreq, semitone);
    let pan = (i / notePattern.length) * 1.2 - 0.6; // Sweep L to R
    let vol = 0.1 + (i / notePattern.length) * 0.04;
    let dur = 0.2 + (i === notePattern.length - 1 ? 0.25 : 0);
    
    playRichTone(freq, dur, vol, [
      { ratio: 2, vol: 0.15, type: 'sine', durMul: 0.6 },
      { ratio: 3, vol: 0.05, type: 'triangle', durMul: 0.3 },
      { ratio: 0.5, vol: 0.08, type: 'sine', durMul: 0.8 } // sub-octave warmth
    ], pan, i * noteSpacing / 1000);
  });
  
  // Whoosh sweep for drama
  playSweep(200, 2000 + lineCount * 500, 0.3 + lineCount * 0.05, 'sine', 0.04, 0, 0);
  
  // Impact noise per line
  for (let i = 0; i < lineCount; i++) {
    let pan = (Math.random() - 0.5) * 0.8;
    playNoise(0.1, 0.04, 3000 + i * 1000, 1.5, pan, i * noteSpacing / 1000);
  }
  
  // Final sparkle
  let finalDelay = (notePattern.length * noteSpacing) / 1000;
  playNoise(0.15, 0.03, 8000, 0.5, 0, finalDelay);
  playTone(semitoneToFreq(baseFreq, notePattern[notePattern.length - 1] + 12), 
           0.4, 'sine', 0.04, 5, 0, finalDelay);
}

function playCombo(comboLevel) {
  // Escalating excitement - each combo level gets more intense
  let level = Math.min(comboLevel, 8);
  let baseFreq = 500 + level * 100;
  
  // Fanfare arpeggio
  let intervals = [0, 4, 7, 12, 16];
  let noteCount = Math.min(3 + level, intervals.length);
  
  for (let i = 0; i < noteCount; i++) {
    let freq = semitoneToFreq(baseFreq, intervals[i]);
    let pan = (i / noteCount) * 1.0 - 0.5;
    let delay = i * 0.055;
    
    playRichTone(freq, 0.2, 0.1, [
      { ratio: 2, vol: 0.15, type: 'sine', durMul: 0.5 },
      { ratio: 1.5, vol: 0.08, type: 'triangle', durMul: 0.4 }
    ], pan, delay);
  }
  
  // Power chord stab at end
  let finalDelay = noteCount * 0.055 + 0.02;
  let powerFreq = semitoneToFreq(baseFreq, 12);
  playRichTone(powerFreq, 0.35, 0.12, [
    { ratio: 1.5, vol: 0.1, type: 'sine', durMul: 0.8 },
    { ratio: 2, vol: 0.08, type: 'triangle', durMul: 0.6 },
    { ratio: 0.5, vol: 0.1, type: 'sine', durMul: 1.0 }
  ], 0, finalDelay);
  
  // Excitement noise burst
  playNoise(0.12, 0.04 + level * 0.005, 4000 + level * 500, 1, 0, finalDelay);
  
  // High sparkle
  playSweep(2000, 4000 + level * 400, 0.15, 'sine', 0.025, 0.3, finalDelay);
  playSweep(2200, 4500 + level * 400, 0.15, 'sine', 0.02, -0.3, finalDelay + 0.03);
}

function playGameOver() {
  // Dramatic descending sequence with reverb tail
  let melody = [
    { note: NOTE_FREQS.E5, dur: 0.3, delay: 0 },
    { note: NOTE_FREQS.D5, dur: 0.3, delay: 0.25 },
    { note: NOTE_FREQS.C5, dur: 0.4, delay: 0.5 },
    { note: NOTE_FREQS.B4, dur: 0.3, delay: 0.8 },
    { note: NOTE_FREQS.A4, dur: 0.5, delay: 1.05 },
    { note: NOTE_FREQS.E4, dur: 0.8, delay: 1.4 }
  ];
  
  melody.forEach((n, i) => {
    let vol = 0.1 + (melody.length - i) * 0.008;
    playRichTone(n.note, n.dur, vol, [
      { ratio: 2, vol: 0.12, type: 'sine', durMul: 0.7 },
      { ratio: 0.5, vol: 0.15, type: 'sine', durMul: 1.0 },
      { ratio: 1.5, vol: 0.06, type: 'triangle', durMul: 0.5 }
    ], (i % 2 === 0 ? -0.15 : 0.15), n.delay);
  });
  
  // Low rumble
  playSweep(100, 40, 1.8, 'sine', 0.06, 0, 0.3);
  
  // Broken glass / scatter noise
  for (let i = 0; i < 4; i++) {
    playNoise(0.15, 0.03, 2000 + i * 1500, 2, (Math.random() - 0.5) * 0.6, 0.2 + i * 0.15);
  }
  
  // Final low sustained note
  playRichTone(NOTE_FREQS.C4 * 0.5, 1.5, 0.08, [
    { ratio: 2, vol: 0.06, type: 'triangle', durMul: 0.8 }
  ], 0, 1.6);
}

function playSpawn() {
  // Bubbly pop sequence - three pieces arriving
  let pops = [NOTE_FREQS.C5, NOTE_FREQS.E5, NOTE_FREQS.G5];
  
  pops.forEach((freq, i) => {
    let pan = (i - 1) * 0.4;
    let delay = i * 0.07;
    
    // Pop attack
    playTone(freq, 0.08, 'sine', 0.07, 0, pan, delay);
    playTone(freq * 2, 0.04, 'sine', 0.03, 0, pan, delay);
    playNoise(0.03, 0.025, 4000, 3, pan, delay);
  });
  
  // Sparkle trail
  playSweep(1500, 3000, 0.12, 'sine', 0.02, 0, 0.2);
}

function playInvalid() {
  // Buzzy rejection with low thud
  playTone(130, 0.15, 'sawtooth', 0.04, 0, 0);
  playTone(120, 0.15, 'sawtooth', 0.035, -15, 0, 0.06);
  
  // Filtered noise thud
  playNoise(0.1, 0.05, 400, 4, 0);
  
  // Quick pitch drop
  playSweep(300, 80, 0.12, 'triangle', 0.05, 0, 0.02);
}

function playHover() {
  // Soft tick with subtle pitch
  playTone(1200, 0.03, 'sine', 0.025, 0, 0);
  playNoise(0.015, 0.015, 5000, 5, 0);
}

function playButtonClick() {
  // Crisp UI click with confirmation chime
  playNoise(0.02, 0.05, 3000, 4, 0);
  
  playRichTone(NOTE_FREQS.C5, 0.08, 0.09, [
    { ratio: 2, vol: 0.12, type: 'sine', durMul: 0.5 }
  ], -0.2, 0.01);
  
  playRichTone(NOTE_FREQS.E5, 0.08, 0.08, [
    { ratio: 2, vol: 0.1, type: 'sine', durMul: 0.5 }
  ], 0, 0.04);
  
  playRichTone(NOTE_FREQS.G5, 0.12, 0.1, [
    { ratio: 2, vol: 0.12, type: 'sine', durMul: 0.6 },
    { ratio: 3, vol: 0.04, type: 'sine', durMul: 0.3 }
  ], 0.2, 0.07);
  
  // Bright sparkle on top
  playSweep(2000, 4000, 0.08, 'sine', 0.02, 0, 0.06);
}

// New: Block landing thud per cell
function playBlockLand(row, col) {
  if (!soundEnabled || !audioCtx) return;
  let pan = ((col / COLS) - 0.5) * 0.6;
  let pitch = 250 - row * 8; // lower rows = lower pitch
  playTone(pitch, 0.06, 'sine', 0.04, 0, pan);
  playNoise(0.025, 0.02, 1200, 3, pan);
}

// New: Cell-by-cell destruction sound in line clear
function playCellDestroy(row, col, delay) {
  if (!soundEnabled || !audioCtx) return;
  let pan = ((col / COLS) - 0.5) * 0.8;
  let freq = 600 + (ROWS - row) * 50 + col * 30;
  playTone(freq, 0.08, 'sine', 0.04, Math.random() * 20, pan, delay);
  playNoise(0.04, 0.02, freq * 3, 2, pan, delay);
}

// New: Achievement/milestone jingle
function playAchievement() {
  let melody = [
    { freq: NOTE_FREQS.C5, delay: 0 },
    { freq: NOTE_FREQS.E5, delay: 0.08 },
    { freq: NOTE_FREQS.G5, delay: 0.16 },
    { freq: NOTE_FREQS.C6, delay: 0.24 },
    { freq: NOTE_FREQS.E6, delay: 0.34 },
    { freq: NOTE_FREQS.G5, delay: 0.44 },
    { freq: NOTE_FREQS.C6, delay: 0.56 }
  ];
  
  melody.forEach(n => {
    playRichTone(n.freq, 0.2, 0.08, [
      { ratio: 2, vol: 0.1, type: 'sine', durMul: 0.5 },
      { ratio: 0.5, vol: 0.06, type: 'triangle', durMul: 0.8 }
    ], 0, n.delay);
  });
  
  playSweep(1000, 5000, 0.3, 'sine', 0.02, 0, 0.5);
  playNoise(0.2, 0.03, 6000, 0.5, 0, 0.55);
}

// ===== SETTINGS SYSTEM =====
let settingsOpen = false;
let settingsAlpha = 0;
let settingsButtons = [];
let settingsPanelRect = { x: 0, y: 0, w: 0, h: 0 };

function drawSettings() {
  if (!settingsOpen && settingsAlpha <= 0.01) return;

  if (settingsOpen && settingsAlpha < 1) {
    settingsAlpha = Math.min(1, settingsAlpha + 0.08);
  } else if (!settingsOpen && settingsAlpha > 0) {
    settingsAlpha = Math.max(0, settingsAlpha - 0.08);
    if (settingsAlpha <= 0.01) return;
  }

  settingsButtons = [];

  ctx.save();
  ctx.globalAlpha = settingsAlpha;

  // Backdrop
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.fillRect(0, 0, W, H);

  // Panel
  let pw = Math.min(W * 0.94, 460);
  let ph = Math.min(H * 0.88, 640);
  let px = (W - pw) / 2;
  let py = (H - ph) / 2;
  let pr = 20;

  settingsPanelRect = { x: px, y: py, w: pw, h: ph };

  // Shadow layers
  for (let i = 3; i >= 0; i--) {
    let ex = i * 5;
    drawRoundRect(px - ex, py - ex + 8 + i * 2, pw + ex * 2, ph + ex * 2, pr + ex);
    ctx.fillStyle = `rgba(0,0,0,${0.07 * (4 - i)})`;
    ctx.fill();
  }

  // Panel bg
  drawRoundRect(px, py, pw, ph, pr);
  let panGrad = ctx.createLinearGradient(px, py, px, py + ph);
  panGrad.addColorStop(0, '#2a1560');
  panGrad.addColorStop(0.5, '#1e0f48');
  panGrad.addColorStop(1, '#150a35');
  ctx.fillStyle = panGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(140,100,255,0.25)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner highlight
  drawRoundRect(px + 3, py + 3, pw - 6, ph - 6, pr - 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Title
  let titleSize = Math.max(18, Math.min(24, pw * 0.07));
  ctx.font = `bold ${titleSize}px Fredoka One, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#fff';
  ctx.fillText('⚙️  AYARLAR', W / 2, py + 28);

  // Divider
  ctx.beginPath();
  ctx.moveTo(px + 20, py + 50);
  ctx.lineTo(px + pw - 20, py + 50);
  let divG = ctx.createLinearGradient(px + 20, 0, px + pw - 20, 0);
  divG.addColorStop(0, 'rgba(140,100,255,0)');
  divG.addColorStop(0.5, 'rgba(140,100,255,0.4)');
  divG.addColorStop(1, 'rgba(140,100,255,0)');
  ctx.strokeStyle = divG;
  ctx.lineWidth = 1;
  ctx.stroke();

  let curY = py + 62;
  let labelSize = Math.max(10, Math.min(13, pw * 0.035));
  let itemH = Math.max(32, Math.min(40, ph * 0.067));
  let sectionGap = Math.max(8, ph * 0.018);
  let sidepad = pw * 0.06;

  // ── TEMA ──
  ctx.font = `bold ${labelSize}px Nunito, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(180,150,255,0.8)';
  ctx.fillText('TEMA', px + sidepad, curY + 8);
  curY += labelSize + 6;

  let themeGridCols = 3;
  let themeW = (pw - sidepad * 2 - (themeGridCols - 1) * 6) / themeGridCols;
  let themeH = itemH * 0.95;

  for (let i = 0; i < THEMES.length; i++) {
    let col2 = i % themeGridCols;
    let row2 = Math.floor(i / themeGridCols);
    let tx = px + sidepad + col2 * (themeW + 6);
    let ty = curY + row2 * (themeH + 5);
    let selected = settings.theme === i;

    drawRoundRect(tx, ty, themeW, themeH, 8);
    let tBg = ctx.createLinearGradient(tx, ty, tx, ty + themeH);
    let T2 = THEMES[i];
    tBg.addColorStop(0, T2.bg[0]);
    tBg.addColorStop(1, T2.bg[2]);
    ctx.fillStyle = tBg;
    ctx.fill();

    if (selected) {
      ctx.strokeStyle = 'rgba(255,215,0,0.9)';
      ctx.lineWidth = 2;
    } else {
      ctx.strokeStyle = 'rgba(140,100,255,0.2)';
      ctx.lineWidth = 1;
    }
    ctx.stroke();

    // Color dots
    let dotColors = T2.neb.slice(0, 3);
    for (let d = 0; d < dotColors.length; d++) {
      let dc = dotColors[d];
      ctx.beginPath();
      ctx.arc(tx + 8 + d * 10, ty + themeH / 2, 3.5, 0, Math.PI * 2);
      ctx.fillStyle = `rgb(${dc[0]},${dc[1]},${dc[2]})`;
      ctx.fill();
    }

    let tnSize = Math.max(8, Math.min(10, themeW * 0.18));
    ctx.font = `bold ${tnSize}px Nunito, sans-serif`;
    ctx.textAlign = 'right';
    ctx.fillStyle = selected ? '#FFD700' : 'rgba(255,255,255,0.7)';
    ctx.fillText(T2.icon + ' ' + T2.name, tx + themeW - 5, ty + themeH / 2 + 1);

    settingsButtons.push({ x: tx, y: ty, w: themeW, h: themeH, action: 'theme', value: i });
  }

  let themeRows = Math.ceil(THEMES.length / themeGridCols);
  curY += themeRows * (themeH + 5) + sectionGap;

  // ── BLOK STİLİ ──
  ctx.font = `bold ${labelSize}px Nunito, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(180,150,255,0.8)';
  ctx.fillText('BLOK STİLİ', px + sidepad, curY + 8);
  curY += labelSize + 6;

  let styleW = (pw - sidepad * 2 - (BLOCK_STYLES.length - 1) * 5) / BLOCK_STYLES.length;
  let styleH = itemH * 0.9;

  for (let i = 0; i < BLOCK_STYLES.length; i++) {
    let sx2 = px + sidepad + i * (styleW + 5);
    let selected = settings.blockStyle === i;

    drawRoundRect(sx2, curY, styleW, styleH, 7);
    ctx.fillStyle = selected ? 'rgba(100,60,220,0.6)' : 'rgba(255,255,255,0.04)';
    ctx.fill();
    ctx.strokeStyle = selected ? 'rgba(255,215,0,0.9)' : 'rgba(140,100,255,0.2)';
    ctx.lineWidth = selected ? 2 : 1;
    ctx.stroke();

    let snSize = Math.max(8, Math.min(11, styleW * 0.22));
    ctx.font = `bold ${snSize}px Nunito, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = selected ? '#FFD700' : 'rgba(255,255,255,0.7)';
    ctx.fillText(BLOCK_STYLES[i].name, sx2 + styleW / 2, curY + styleH / 2 + 1);

    settingsButtons.push({ x: sx2, y: curY, w: styleW, h: styleH, action: 'blockStyle', value: i });
  }

  curY += styleH + sectionGap;

  // ── TOGGLE AYARLARI ──
  let toggles = [
    { key: 'sound', label: '🔊  Ses', onLabel: 'AÇIK', offLabel: 'KAPALI', onColor: '#4ECDC4', offColor: '#FF6B6B' },
    { key: 'ghost', label: '👻  Hayalet Önizleme', onLabel: 'AÇIK', offLabel: 'KAPALI', onColor: '#4ECDC4', offColor: '#FF6B6B' },
    { key: 'vibration', label: '📳  Titreşim', onLabel: 'AÇIK', offLabel: 'KAPALI', onColor: '#4ECDC4', offColor: '#FF6B6B' }
  ];

  ctx.font = `bold ${labelSize}px Nunito, sans-serif`;
  ctx.textAlign = 'left';
  ctx.fillStyle = 'rgba(180,150,255,0.8)';
  ctx.fillText('SEÇENEKLER', px + sidepad, curY + 8);
  curY += labelSize + 6;

  let toggleH = itemH * 0.92;
  let toggleGap = 5;

  for (let tog of toggles) {
    let val = settings[tog.key];

    drawRoundRect(px + sidepad, curY, pw - sidepad * 2, toggleH, 8);
    ctx.fillStyle = 'rgba(255,255,255,0.03)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(140,100,255,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    let tlSize = Math.max(10, Math.min(13, pw * 0.033));
    ctx.font = `bold ${tlSize}px Nunito, sans-serif`;
    ctx.textAlign = 'left';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.textBaseline = 'middle';
    ctx.fillText(tog.label, px + sidepad + 10, curY + toggleH / 2);

    // Toggle pill
    let pillW = Math.max(52, pw * 0.17);
    let pillH = toggleH * 0.58;
    let pillX = px + pw - sidepad - pillW;
    let pillY = curY + (toggleH - pillH) / 2;
    let pillR = pillH / 2;

    drawRoundRect(pillX, pillY, pillW, pillH, pillR);
    ctx.fillStyle = val ? tog.onColor : 'rgba(80,60,120,0.8)';
    ctx.fill();

    // Knob
    let knobR = pillH * 0.4;
    let knobX = val ? pillX + pillW - knobR - pillH * 0.1 : pillX + knobR + pillH * 0.1;
    ctx.beginPath();
    ctx.arc(knobX, pillY + pillH / 2, knobR, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // State label
    let stSize = Math.max(7, Math.min(9, pillW * 0.18));
    ctx.font = `bold ${stSize}px Nunito, sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = val ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.4)';
    let stX = val ? pillX + pillH * 0.6 : pillX + pillW - pillH * 0.5;
    ctx.fillText(val ? tog.onLabel : tog.offLabel, stX, pillY + pillH / 2 + 1);

    settingsButtons.push({ x: pillX - 5, y: pillY - 5, w: pillW + 10, h: pillH + 10, action: 'toggle', value: tog.key });

    curY += toggleH + toggleGap;
  }

  curY += sectionGap;

  // ── KAPAT butonu ──
  let closeBW = Math.min(160, pw * 0.5);
  let closeBH = Math.max(36, Math.min(44, ph * 0.075));
  let closeBX = W / 2 - closeBW / 2;
  let closeBY = py + ph - closeBH - 14;

  // Ensure button fits inside panel
  if (closeBY < curY) closeBY = curY + 4;

  drawRoundRect(closeBX, closeBY, closeBW, closeBH, closeBH / 2);
  let closeBGrad = ctx.createLinearGradient(closeBX, closeBY, closeBX, closeBY + closeBH);
  closeBGrad.addColorStop(0, '#7B4FBF');
  closeBGrad.addColorStop(1, '#5A3490');
  ctx.fillStyle = closeBGrad;
  ctx.fill();
  ctx.strokeStyle = 'rgba(180,140,255,0.3)';
  ctx.lineWidth = 1;
  ctx.stroke();

  let closeFSize = Math.max(12, Math.min(15, closeBW * 0.12));
  ctx.font = `bold ${closeFSize}px Fredoka One, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#fff';
  ctx.fillText('✕  KAPAT', W / 2, closeBY + closeBH / 2 + 1);

  settingsButtons.push({ x: closeBX, y: closeBY, w: closeBW, h: closeBH, action: 'close' });

  ctx.restore();
}

function handleSettingsClick(px2, py2) {
  for (let btn of settingsButtons) {
    if (px2 >= btn.x && px2 <= btn.x + btn.w && py2 >= btn.y && py2 <= btn.y + btn.h) {
      if (btn.action === 'close') {
        settingsOpen = false;
        playButtonClick();
      } else if (btn.action === 'theme') {
        settings.theme = btn.value;
        applySettings();
        playButtonClick();
      } else if (btn.action === 'blockStyle') {
        settings.blockStyle = btn.value;
        applySettings();
        playButtonClick();
      } else if (btn.action === 'toggle') {
        settings[btn.value] = !settings[btn.value];
        applySettings();
        if (soundEnabled) playTone(800, 0.08, 'sine', 0.1);
      }
      return true;
    }
  }
  // Backdrop click closes
  if (px2 < settingsPanelRect.x || px2 > settingsPanelRect.x + settingsPanelRect.w ||
      py2 < settingsPanelRect.y || py2 > settingsPanelRect.y + settingsPanelRect.h) {
    settingsOpen = false;
    playButtonClick();
    return true;
  }
  return false;
}

function loadSettings() {
  try {
    let s = localStorage.getItem('blockBlastSettings');
    if (s) return JSON.parse(s);

  return null;

function saveSettings() {
  try {

  soundEnabled = settings.sound;
  BLOCK_COLORS = getStyleColors(settings.blockStyle);
  let T = THEMES[settings.theme];
  if (T) document.body.style.background = T.body;
  clearAllCaches();
  saveSettings();
}

// ===== RESPONSIVE SIZING =====
let W, H, CELL, BOARD_X, BOARD_Y, PANEL_Y, BLOCK_SIZE, SCORE_H;
const COLS = 8, ROWS = 8;
let lastW = 0, lastH = 0;

let cachesReady = false;

function clearAllCaches() {
  if (!cachesReady) return;
  blockCacheMap.clear();
  cacheGeneration++;
  particleSprites.clear();
  bgCache = null;
  bgStarCanvas = null;
  boardFrameCache = null;
  boardFrameKey = '';
}

function getLayoutMode(ww, wh) {
  let ar = ww / wh;
  if (ar > 1.6) return 'landscape';       // TV, akıllı tahta yatay, tablet yatay
  if (ar > 1.1) return 'landscape-mild';  // tablet hafif yatay
  if (ww >= 1024) return 'desktop-wide';  // büyük ekran dikey/kare
  if (ww >= 600) return 'tablet';         // tablet dikey
  return 'mobile';                        // telefon
}

function resize() {
  let ww = window.innerWidth;
  let wh = window.innerHeight;

  if (ww === lastW && wh === lastH) return;
  lastW = ww;
  lastH = wh;

  clearAllCaches();

  let mode = getLayoutMode(ww, wh);
  let w, h;

  if (mode === 'landscape' || mode === 'landscape-mild') {
    // Yatay: oyun alanı ekranın ortasında dikey şerit olarak
    // Yüksekliği ekrana sığdır, genişliği ona göre ayarla
    h = Math.min(wh * 0.98, 900);
    w = h / 1.78; // sabit oran
    // Çok geniş ekranlarda (akıllı tahta) ekranın %45'ini geçmesin
    let maxLandW = ww * (mode === 'landscape' ? 0.42 : 0.55);
    if (w > maxLandW) { w = maxLandW; h = w * 1.78; }
  } else if (mode === 'desktop-wide') {
    // Büyük dikey ekran: makul bir pencere
    w = Math.min(ww * 0.55, 520);
    h = Math.min(wh * 0.96, w * 1.85);
    if (h < w * 1.5) h = w * 1.5;
  } else if (mode === 'tablet') {
    // Tablet dikey
    w = Math.min(ww * 0.88, 500);
    h = Math.min(wh * 0.97, w * 1.9);
    if (h < w * 1.5) { w = h / 1.5; }
  } else {
    // Mobil: tam genişlik
    w = ww;
    h = wh;
  }

  w = Math.max(Math.round(w), 280);
  h = Math.max(Math.round(h), 400);

  // DPR: piksel bütçesine göre sınırla
  let rawDPR = window.devicePixelRatio || 1;
  // Akıllı tahta gibi büyük ekranlarda DPR genellikle 1, telefonda 2-3
  let pixelBudget = mode === 'mobile' ? 900000 : 1400000;
  let maxDPR = Math.sqrt(pixelBudget / (w * h));
  let ratio = Math.max(1, Math.min(rawDPR, maxDPR, 3));

  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = Math.round(w * ratio);
  canvas.height = Math.round(h * ratio);
  ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

  W = w;
  H = h;

  // ===== LAYOUT HESAPLAMA =====
  // Tüm elemanlar W ve H'a göre orantılı

  // Skor paneli yüksekliği
  SCORE_H = Math.round(Math.max(48, Math.min(90, H * 0.1)));

  // Boşluklar
  let gap1 = Math.round(Math.max(4, H * 0.008));   // skor-tahta arası
  let gap2 = Math.round(Math.max(6, H * 0.012));   // tahta-panel arası

  // Panel yüksekliği
  let panelH = Math.round(Math.max(80, Math.min(160, H * 0.2)));

  // Tahta için kalan alan
  let boardAvailH = H - SCORE_H - gap1 - gap2 - panelH;
  let boardAvailW = W;

  // Hücre boyutu: en/boy'a göre ikisinden küçüğünü al
  let cellFromW = Math.floor((boardAvailW - Math.max(8, W * 0.02) * 2) / COLS);
  let cellFromH = Math.floor(boardAvailH / ROWS);
  CELL = Math.max(18, Math.min(cellFromW, cellFromH));

  // Tahta boyutları
  let boardW = CELL * COLS;
  let boardH = CELL * ROWS;

  // Tahta yatay merkez
  BOARD_X = Math.round((W - boardW) / 2);

  // Tahta dikey: kalan boşluğu üst/alt orantılı dağıt
  let extraV = boardAvailH - boardH;
  BOARD_Y = Math.round(SCORE_H + gap1 + extraV * 0.3);

  // Panel başlangıcı
  PANEL_Y = Math.round(BOARD_Y + boardH + gap2);

  // Blok boyutu (panel'deki mini bloklar için)
  BLOCK_SIZE = Math.max(12, Math.floor(CELL * 0.7));
}

// Tahtadaki dolu hücre sayısını hesapla (0-64)
function getBoardFillCount() {
  let count = 0;
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c] > 0) count++;
  return count;
}

// Bir parçanın kaç pozisyona sığabileceğini say
function countFitPositions(piece) {
  let count = 0;
  for (let r = 0; r <= ROWS - piece.rows; r++)
    for (let c = 0; c <= COLS - piece.cols; c++)
      if (canPlacePiece(piece, r, c)) count++;
  return count;
}

// Parça büyüklüğünü hesapla (dolu hücre sayısı)
function getPieceSize(def) {
  let count = 0;
  for (let r = 0; r < def.shape.length; r++)
    for (let c = 0; c < def.shape[0].length; c++)
      if (def.shape[r][c]) count++;
  return count;
}

// Zorluk seviyesine göre ağırlıklı parça seçimi
function weightedRandomPiece(mustFit, existingPieces) {
  let fillRatio = getBoardFillCount() / (ROWS * COLS); // 0..1
  let scoreFactor = Math.min(score / 2000, 1);         // 0..1, 2000 puanda max

  // Zorluk çok yavaş artar
  let difficultyBias = fillRatio * 0.3 + scoreFactor * 0.2; // max ~0.5

  // Başlangıçta 3-5 hücre, ilerledikçe max 7
  let maxAllowedSize = Math.round(4 + difficultyBias * 3); // 4..7 arası

  // Ağırlıklı havuz oluştur
  let pool = [];

  for (let i = 0; i < PIECE_DEFS.length; i++) {
    let def = PIECE_DEFS[i];
    let sz = getPieceSize(def);

    // Çok büyük parçaları erken oyunda engelle
    if (sz > maxAllowedSize) continue;

    // Test parçasını oluştur
    let testPiece = {
      shape: def.shape.map(r => [...r]),
      color: 0,
      rows: def.shape.length,
      cols: def.shape[0].length
    };

    let fits = countFitPositions(testPiece);

    // Hiç sığmıyorsa ve mustFit modundaysa atla
    if (mustFit && fits === 0) continue;

    // Temel ağırlık: sığdığı pozisyon sayısına orantılı
    let weight = Math.max(1, fits) * 2;

    // Orta boy parçalar (3-5 hücre) en çok tercih edilsin
    if (sz >= 3 && sz <= 5) weight *= 2.5;
    // Çok küçükler az gelsin
    if (sz <= 2) weight *= 0.6;
    if (sz <= 1) weight *= 0.4;
    // Çok büyükler biraz az gelsin ama tamamen engellenmesin
    if (sz >= 7) weight *= 0.5;
    if (sz >= 8) weight *= 0.3;

    // Aynı büyüklükte parçalar varsa hafif ceza (çeşitlilik)
    if (existingPieces) {
      for (let ep of existingPieces) {
        if (ep && getPieceSize(ep) === sz) {
          weight *= 0.85;
          break;
        }
      }
    }

    // Sığdığı pozisyon sayısı çok azsa ek ceza
    if (fits < 3) weight *= 0.7;
    if (fits < 1) weight *= 0.3;

    pool.push({ def, weight, fits });
  }

  // Havuz boşsa (çok dolu tahta) en küçük sığan parçayı ver
  if (pool.length === 0) {
    for (let i = 0; i < PIECE_DEFS.length; i++) {
      let def = PIECE_DEFS[i];
      let testPiece = {
        shape: def.shape.map(r => [...r]),
        color: 0,
        rows: def.shape.length,
        cols: def.shape[0].length
      };
      if (countFitPositions(testPiece) > 0) {
        pool.push({ def, weight: 1, fits: 1 });
        break; // sadece ilkini al, döngüyü bitir
      }
    }
  }

  // Hâlâ boşsa tamamen rastgele
  if (pool.length === 0) {
    let def = PIECE_DEFS[Math.floor(Math.random() * PIECE_DEFS.length)];
    let colorIdx = Math.floor(Math.random() * BLOCK_COLORS.length);
    return {
      shape: def.shape.map(r => [...r]),
      color: colorIdx,
      rows: def.shape.length,
      cols: def.shape[0].length
    };
  }

  // Ağırlıklı rastgele seçim
  let totalWeight = 0;
  for (let item of pool) totalWeight += item.weight;
  let rand = Math.random() * totalWeight;
  let chosen = pool[pool.length - 1].def;
  for (let item of pool) {
    rand -= item.weight;
    if (rand <= 0) { chosen = item.def; break; }
  }

  let colorIdx = Math.floor(Math.random() * BLOCK_COLORS.length);
  return {
    shape: chosen.shape.map(r => [...r]),
    color: colorIdx,
    rows: chosen.shape.length,
    cols: chosen.shape[0].length
  };
}

function randomPiece() {
  return weightedRandomPiece(false, null);
}

function spawnPieces() {
  // Önce boş slotları belirle
  let emptySlots = [];
  for (let i = 0; i < 3; i++) {
    if (!panelPieces[i]) emptySlots.push(i);
  }
  if (emptySlots.length === 0) return;

  // İlk parçaları oluştur (mevcut parçaları komşu olarak ver)
  let newPieces = [...panelPieces];

  for (let i = 0; i < emptySlots.length; i++) {
    let slotIdx = emptySlots[i];
    // İlk slotta mustFit=true: en az 1 parça kesinlikle sığsın
    let mustFit = (i === 0);
    newPieces[slotIdx] = weightedRandomPiece(mustFit, newPieces);
  }

  // Güvenlik kontrolü: 3 parçanın en az 1'i sığmalı
  let anyFits = false;
  for (let p of newPieces) {
    if (p && canPieceFitAnywhere(p)) { anyFits = true; break; }
  }

  // Hiçbiri sığmıyorsa en küçük sığan parçayla ilk slotu değiştir
  if (!anyFits) {
    let bestDef = null;
    let bestFits = 0;
    for (let def of PIECE_DEFS) {
      let tp = {
        shape: def.shape.map(r => [...r]),
        color: 0,
        rows: def.shape.length,
        cols: def.shape[0].length
      };
      let f = countFitPositions(tp);
      if (f > bestFits) { bestFits = f; bestDef = def; }
    }
    if (bestDef) {
      let colorIdx = Math.floor(Math.random() * BLOCK_COLORS.length);
      newPieces[emptySlots[0]] = {
        shape: bestDef.shape.map(r => [...r]),
        color: colorIdx,
        rows: bestDef.shape.length,
        cols: bestDef.shape[0].length
      };
    }
  }

  panelPieces = newPieces;
}

function allPanelEmpty() {
  return panelPieces.every(p => p === null);
}

// Drawing helpers
function rrPath(tc, x, y, w, h, r) {
  if (w <= 0 || h <= 0) return;
  r = Math.min(Math.max(0, r), w / 2, h / 2);
  tc.moveTo(x + r, y);
  tc.lineTo(x + w - r, y);
  tc.quadraticCurveTo(x + w, y, x + w, y + r);
  tc.lineTo(x + w, y + h - r);
  tc.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  tc.lineTo(x + r, y + h);
  tc.quadraticCurveTo(x, y + h, x, y + h - r);
  tc.lineTo(x, y + r);
  tc.quadraticCurveTo(x, y, x + r, y);
}

function drawRoundRect(x, y, w, h, r) {
  ctx.beginPath();
  rrPath(ctx, x, y, w, h, r);
  ctx.closePath();
}

// ===== OFFSCREEN BLOCK CACHE =====
const blockCacheMap = new Map();
let cacheGeneration = 0;
let boardFrameCache = null;
let boardFrameKey = '';
cachesReady = true;

function getCachedBlock(size, colorIdx) {
  if (size < 10) return null;
  let key = `${size|0}_${colorIdx}_${settings.blockStyle}_${cacheGeneration}`;
  
  if (blockCacheMap.has(key)) return blockCacheMap.get(key);
  
  if (blockCacheMap.size > 150) {
    blockCacheMap.clear();
    cacheGeneration++;
    key = `${size|0}_${colorIdx}_${settings.blockStyle}_${cacheGeneration}`;
  }
  
  let margin = 8;
  let cs = Math.ceil(size + margin * 2);
  let oc = document.createElement('canvas');
  oc.width = cs;
  oc.height = cs;
  drawBlockToCanvas(oc.getContext('2d'), margin, margin, size, colorIdx);
  
  let entry = { canvas: oc, margin: margin };
  blockCacheMap.set(key, entry);
  return entry;
}

function drawBlockToCanvas(tc, x, y, size, colorIdx) {
  let c = BLOCK_COLORS[colorIdx % BLOCK_COLORS.length];
  let pad = size * 0.06;
  let s = size - pad * 2;
  let style = settings.blockStyle;
  
  if (style === 1) {
    // ═══ FLAT ═══
    let r = Math.min(s * 0.15, 8);
    tc.beginPath(); rrPath(tc, x + pad, y + pad, s, s, r); tc.closePath();
    tc.fillStyle = c.main;
    tc.fill();
    // Top band
    tc.save(); tc.clip();
    tc.fillStyle = c.light;
    tc.fillRect(x + pad, y + pad, s, s * 0.18);
    tc.fillStyle = c.dark;
    tc.fillRect(x + pad, y + pad + s * 0.82, s, s * 0.18);
    tc.restore();
    tc.beginPath(); rrPath(tc, x + pad, y + pad, s, s, r); tc.closePath();
    tc.strokeStyle = 'rgba(255,255,255,0.12)';
    tc.lineWidth = 1;
    tc.stroke();

  } else if (style === 2) {
    // ═══ NEON ═══
    let r = Math.min(s * 0.2, 10);
    tc.beginPath(); rrPath(tc, x + pad, y + pad, s, s, r); tc.closePath();
    tc.fillStyle = c.shadow;
    tc.fill();
    for (let i = 3; i >= 0; i--) {
      let ins = i * 1.5;
      tc.beginPath(); rrPath(tc, x + pad + ins, y + pad + ins, s - ins * 2, s - ins * 2, Math.max(1, r - ins)); tc.closePath();
      tc.save(); tc.globalAlpha = 0.15 + (3 - i) * 0.2;
      tc.strokeStyle = c.light;
      tc.lineWidth = 2.5 - i * 0.4;
      tc.stroke(); tc.restore();
    }
    let ip = s * 0.22;
    tc.beginPath(); rrPath(tc, x + pad + ip, y + pad + ip, s - ip * 2, s - ip * 2, Math.max(1, r - ip * 0.5)); tc.closePath();
    tc.save(); tc.globalAlpha = 0.2;
    tc.strokeStyle = c.main; tc.lineWidth = 1; tc.stroke(); tc.restore();
    tc.beginPath(); tc.arc(x + pad + s / 2, y + pad + s / 2, s * 0.05, 0, Math.PI * 2);
    tc.save(); tc.globalAlpha = 0.5; tc.fillStyle = c.light; tc.fill(); tc.restore();

  } else if (style === 3) {
    // ═══ RETRO ═══
    tc.fillStyle = c.main;
    tc.fillRect(x + pad, y + pad, s, s);
    let b = Math.max(2, s * 0.08);
    tc.fillStyle = c.light;
    tc.fillRect(x + pad, y + pad, s, b);
    tc.fillRect(x + pad, y + pad, b, s);
    tc.fillStyle = c.shadow;
    tc.fillRect(x + pad, y + pad + s - b, s, b);
    tc.fillRect(x + pad + s - b, y + pad, b, s);
    tc.fillStyle = c.main;
    tc.fillRect(x + pad + b, y + pad + b, s - b * 2, s - b * 2);
    tc.fillStyle = c.dark;
    tc.fillRect(x + pad + b + 1, y + pad + b + 1, s - b * 2 - 2, s - b * 2 - 2);
    tc.fillStyle = c.main;
    tc.fillRect(x + pad + b + 2, y + pad + b + 2, s - b * 2 - 4, s - b * 2 - 4);

  } else {
    // ═══ GLOSSY (0) / PASTEL (4) ═══
    let r = Math.min(s * 0.2, 10);
    tc.beginPath(); rrPath(tc, x + pad + 2, y + pad + 3, s, s, r); tc.closePath();
    tc.fillStyle = 'rgba(0,0,0,0.25)';
    tc.fill();
    tc.beginPath(); rrPath(tc, x + pad, y + pad, s, s, r); tc.closePath();
    let grd = tc.createLinearGradient(x + pad, y + pad, x + pad + s * 0.3, y + pad + s);
    grd.addColorStop(0, c.light); grd.addColorStop(0.35, c.main);
    grd.addColorStop(0.7, c.dark); grd.addColorStop(1, c.shadow);
    tc.fillStyle = grd; tc.fill();
    tc.strokeStyle = 'rgba(255,255,255,0.15)'; tc.lineWidth = 1; tc.stroke();
    tc.beginPath(); rrPath(tc, x + pad + s * 0.08, y + pad + s * 0.05, s * 0.84, s * 0.4, r * 0.6); tc.closePath();
    let hg = tc.createLinearGradient(0, y + pad, 0, y + pad + s * 0.45);
    hg.addColorStop(0, 'rgba(255,255,255,0.55)'); hg.addColorStop(0.5, 'rgba(255,255,255,0.15)');
    hg.addColorStop(1, 'rgba(255,255,255,0)'); tc.fillStyle = hg; tc.fill();
    tc.beginPath(); rrPath(tc, x + pad + s * 0.15, y + pad + s * 0.7, s * 0.7, s * 0.22, r * 0.3); tc.closePath();
    let bg2 = tc.createLinearGradient(0, y + pad + s * 0.7, 0, y + pad + s * 0.92);
    bg2.addColorStop(0, 'rgba(255,255,255,0)'); bg2.addColorStop(1, 'rgba(255,255,255,0.08)');
    tc.fillStyle = bg2; tc.fill();
    tc.beginPath(); tc.arc(x + pad + s * 0.28, y + pad + s * 0.22, s * 0.07, 0, Math.PI * 2);
    let sg = tc.createRadialGradient(x + pad + s * 0.28, y + pad + s * 0.22, 0, x + pad + s * 0.28, y + pad + s * 0.22, s * 0.07);
    sg.addColorStop(0, 'rgba(255,255,255,0.9)'); sg.addColorStop(1, 'rgba(255,255,255,0)');
    tc.fillStyle = sg; tc.fill();
    tc.beginPath(); tc.arc(x + pad + s * 0.38, y + pad + s * 0.18, s * 0.03, 0, Math.PI * 2);
    tc.fillStyle = 'rgba(255,255,255,0.7)'; tc.fill();
  }
}

let globalTime = 0;

function drawBlock(x, y, size, colorIdx, alpha, glow, pulse) {
  if (alpha === undefined) alpha = 1;
  let sizeKey = Math.round(size);
  
  ctx.save();
  ctx.globalAlpha = alpha;
  
  // Pulse transform
  if (pulse) {
    let ps = 1 + Math.sin(globalTime * 0.08) * 0.04;
    let px = x + size / 2, py = y + size / 2;
    ctx.translate(px, py);
    ctx.scale(ps, ps);
    ctx.translate(-px, -py);
  }
  
  // Glow: radial gradient (replaces expensive shadowBlur)
  if (glow) {
    let c = BLOCK_COLORS[colorIdx % BLOCK_COLORS.length];
    let gp = 0.3 + Math.sin(globalTime * 0.1) * 0.1;
    let gr = size * 0.75;
    let gx = x + size / 2, gy = y + size / 2;
    ctx.save();
    ctx.globalAlpha = alpha * gp;
    let gg = ctx.createRadialGradient(gx, gy, size * 0.1, gx, gy, gr);
    gg.addColorStop(0, c.glow);
    gg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.arc(gx, gy, gr, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  
  // Block body from cache
  let cached = getCachedBlock(sizeKey, colorIdx);
  if (cached) {
    ctx.drawImage(cached.canvas, x - cached.margin, y - cached.margin);
  }
  
  ctx.restore();
}

function drawEmptyCell(x, y, size, row, col) {
  let pad = size * 0.06;
  let s = size - pad * 2;
  let r = Math.min(s * 0.2, 8);
  
  let isDark = (row + col) % 2 === 0;
  
  drawRoundRect(x + pad, y + pad, s, s, r);
  ctx.fillStyle = isDark ? 'rgba(255,255,255,0.035)' : 'rgba(255,255,255,0.06)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  
  if (s > 20) {
    drawRoundRect(x + pad + 1, y + pad + 1, s - 2, s - 2, Math.max(0, r - 1));
    let innerGrad = ctx.createLinearGradient(x, y, x, y + s);
    innerGrad.addColorStop(0, 'rgba(0,0,0,0.08)');
    innerGrad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = innerGrad;
    ctx.fill();
  }
}
